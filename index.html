/* ═══════════════════════════════════════════════════════════  MINI COMPONENTS  */
function Badge({ score }) {
  const r = getRank(score);
  return <span className="badge" style={{ color:r.color, borderColor:r.color+"44", background:r.bg }}>{r.name}</span>;
}
function Bar({ pct, color }) {
  return <div className="bar-t"><div className="bar-f" style={{ width:`${Math.min(100,pct)}%`, background:color, boxShadow:`0 0 6px ${color}55` }} /></div>;
}
function Lbl({ children }) {
  return <div className="lbl">{children}</div>;
}

/* ═══════════════════════════════════════════════════════════  DASHBOARD  */
function DashboardTab({ prs, sessions, onNavigate }) {
  const muscleScores = useMemo(() =>
    MUSCLES.map(m => ({ muscle:m, score: getMuscleScore(m, prs) })),
  [prs]);

  const overall = useMemo(() => {
    const f = muscleScores.filter(m => m.score > 0);
    return f.length ? Math.round(f.reduce((s,m) => s+m.score, 0) / f.length) : 0;
  }, [muscleScores]);

  const rank = getRank(overall);
  const next = getNextRank(overall);
  const topPct = scoreToTopPct(overall);

  const last7 = useMemo(() => {
    const dates = new Set(sessions.map(s => s.date));
    return Array.from({length:7}, (_,i) => {
      const d = new Date(); d.setDate(d.getDate() - (6-i));
      const iso = d.toISOString().slice(0,10);
      return { iso, label:weekChar(iso), trained:dates.has(iso) };
    });
  }, [sessions]);

  const fact = useMemo(() => FUN_FACTS[new Date().getDate() % FUN_FACTS.length], []);

  const strongest = [...muscleScores].filter(m=>m.score>0).sort((a,b)=>b.score-a.score)[0];
  const weakest   = [...muscleScores].filter(m=>m.score>0).sort((a,b)=>a.score-b.score)[0];

  const ICONS = { Chest:"◈", Back:"◉", Legs:"◆", Shoulders:"◇", Arms:"◈", Core:"◎" };

  const muscleLastTrained = useMemo(() => {
    const result = {};
    for (const session of sessions) {
      for (const ex of session.exercises) {
        if (!result[ex.muscle] || session.date > result[ex.muscle]) {
          result[ex.muscle] = session.date;
        }
      }
    }
    return result;
  }, [sessions]);

  return (
    <div className="scroll fi">
      {/* Rank Card */}
      <div className="card" style={{ marginBottom:14, background:`linear-gradient(135deg, ${rank.bg}, rgba(0,0,0,0.15))`, borderColor:`${rank.color}30` }}>
        <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:12 }}>
          <div>
            <div style={{ fontFamily:"var(--head)", fontSize:11, letterSpacing:2, color:"var(--muted)", marginBottom:2, fontWeight:600 }}>OVERALL RANK</div>
            <div style={{ fontFamily:"var(--head)", fontSize:58, fontWeight:800, color:rank.color, lineHeight:1 }}>{overall}</div>
            <div style={{ fontFamily:"var(--head)", fontSize:18, fontWeight:700, color:rank.color, letterSpacing:2, textTransform:"uppercase", marginTop:2 }}>{rank.name}</div>
          </div>
          <div style={{ textAlign:"right" }}>
            {overall > 0 && (
              <div className="top-pct" style={{ background:`${rank.color}18`, border:`1px solid ${rank.color}44`, color:rank.color, marginBottom:8 }}>
                Top {topPct}% worldwide
              </div>
            )}
            <div style={{ fontSize:12, color:"var(--muted)" }}>Based on {Object.keys(prs).length} PRs</div>
          </div>
        </div>
        {next ? (
          <>
            <Bar pct={overall===0 ? 0 : ((overall-rank.pct)/(next.pct-rank.pct))*100} color={rank.color} />
            <div style={{ fontSize:12, color:"var(--muted)", marginTop:6 }}>
              {next.pct - overall} pts to <strong style={{ color:next.color }}>{next.name}</strong>
            </div>
          </>
        ) : (
          <div style={{ fontSize:13, color:rank.color, marginTop:6 }}>Maximum rank achieved 🏆</div>
        )}
      </div>

      {/* Muscle Recovery */}
      {sessions.length > 0 && (
        <>
          <Lbl>Muscle Recovery</Lbl>
          <div className="rec-grid">
            {MUSCLES.map(m => {
              const lastDate = muscleLastTrained[m];
              let status, color, dotColor;
              if (!lastDate) {
                status = "No data"; color = "var(--muted)"; dotColor = "var(--bdr)";
              } else {
                const hoursAgo = (Date.now() - new Date(lastDate+"T00:00:00").getTime()) / 3600000;
                if (hoursAgo < 24)      { status = "Tired";      color = "var(--red)"; dotColor = "var(--red)"; }
                else if (hoursAgo < 48) { status = "Recovering"; color = "var(--gld)"; dotColor = "var(--gld)"; }
                else                    { status = "Ready";      color = "var(--grn)"; dotColor = "var(--grn)"; }
              }
              return (
                <div key={m} className="rec-cell" style={{ borderColor: lastDate ? dotColor+"40" : undefined }}>
                  <span className="rec-dot" style={{ background:dotColor }} />
                  <div style={{ fontFamily:"var(--head)", fontSize:13, fontWeight:700, color:"var(--text)", marginBottom:2 }}>{m}</div>
                  <div style={{ fontSize:11, color }}>{status}</div>
                  {lastDate && <div style={{ fontSize:10, color:"var(--muted)", marginTop:1 }}>{fmtShort(lastDate)}</div>}
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* Fun Fact */}
      <div className="fact">
        <span className="fact-i">{fact.icon}</span>
        <span className="fact-t">{fact.text}</span>
      </div>

      {/* Week */}
      <Lbl>This Week</Lbl>
      <div className="card">
        <div className="wdots">
          {last7.map(d => (
            <div key={d.iso} className="wdot">
              <div className={`wdot-c ${d.trained?"tr":""}`}>{d.trained?"✓":""}</div>
              <div className={`wdot-l ${d.trained?"tr":""}`}>{d.label}</div>
            </div>
          ))}
        </div>
        <div style={{ fontSize:13, color:"var(--text2)", textAlign:"center" }}>
          {last7.filter(d=>d.trained).length} of 7 days trained this week
        </div>
      </div>

      {/* Muscle Scores */}
      <Lbl>Muscle Groups</Lbl>
      {muscleScores.map(({ muscle, score }) => {
        const r = getRank(score);
        const tp = scoreToTopPct(score);
        return (
          <div key={muscle} className="card" style={{ padding:"14px 16px", borderColor:score>0 ? r.color+"25":"var(--bdr)" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <span style={{ fontSize:20, color:r.color }}>{ICONS[muscle]}</span>
                <div>
                  <div className="h3">{muscle}</div>
                  {score > 0 ? (
                    <div style={{ display:"flex", alignItems:"center", gap:6, marginTop:2 }}>
                      <Badge score={score} />
                      <span style={{ fontSize:11, color:"var(--muted)" }}>Top {tp}%</span>
                    </div>
                  ) : (
                    <span style={{ fontSize:12, color:"var(--muted)" }}>No PRs yet</span>
                  )}
                </div>
              </div>
              <div style={{ textAlign:"right" }}>
                <div style={{ fontFamily:"var(--head)", fontSize:30, fontWeight:800, color:score>0?r.color:"var(--muted)", lineHeight:1 }}>{score}</div>
                <div style={{ fontSize:11, color:"var(--muted)" }}>/ 100</div>
              </div>
            </div>
            <Bar pct={score} color={score>0?r.color:"var(--muted)"} />
          </div>
        );
      })}

      {/* Insights */}
      {overall > 0 && (
        <>
          <Lbl>Quick Insights</Lbl>
          <div className="sg2">
            {strongest && (
              <div className="sbox" style={{ borderColor:"rgba(52,211,153,.22)" }}>
                <div style={{ fontSize:22, marginBottom:4 }}>💪</div>
                <div className="slbl">Strongest</div>
                <div style={{ fontFamily:"var(--head)", fontSize:18, fontWeight:700, color:"var(--grn)", marginTop:4 }}>{strongest.muscle}</div>
                <div style={{ fontSize:12, color:"var(--muted)" }}>Score {strongest.score}</div>
              </div>
            )}
            {weakest && (
              <div className="sbox" style={{ borderColor:"rgba(244,63,94,.22)" }}>
                <div style={{ fontSize:22, marginBottom:4 }}>🎯</div>
                <div className="slbl">Focus Area</div>
                <div style={{ fontFamily:"var(--head)", fontSize:18, fontWeight:700, color:"var(--red)", marginTop:4 }}>{weakest.muscle}</div>
                <div style={{ fontSize:12, color:"var(--muted)" }}>Score {weakest.score}</div>
              </div>
            )}
          </div>
        </>
      )}

      {overall === 0 && (
        <div style={{ marginTop:10, background:"rgba(56,189,248,.05)", border:"1px solid rgba(56,189,248,.15)", borderRadius:10, padding:"24px 20px", textAlign:"center" }}>
          <div style={{ fontSize:36, marginBottom:10 }}>🏋️</div>
          <div className="h2" style={{ marginBottom:6 }}>Set Your First PR</div>
          <div style={{ fontSize:14, color:"var(--text2)" }}>Head to the <strong style={{ color:"var(--acc)" }}>PRs</strong> tab and log your best lifts to unlock your strength rank.</div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════  PRs TAB  */
function PRsTab({ prs, setPrs, prHistory }) {
  const [filter,  setFilter]  = useState("All");
  const [editing, setEditing] = useState(null);
  const [weight,  setWeight]  = useState("");
  const [reps,    setReps]    = useState("");
  const [flashId, setFlashId] = useState(null);

  const filtered = filter === "All" ? ALL_EX : ALL_EX.filter(e => e.muscle === filter);

  const startEdit = ex => {
    const pr = prs[ex.id];
    setEditing(ex.id);
    setWeight(pr && !ex.isReps ? String(pr.weight) : "");
    setReps(pr ? String(pr.reps) : "");
  };

  const save = ex => {
    if (!reps) return;
    const w = ex.isReps ? 0 : Number(weight);
    const r = Number(reps);
    if (!ex.isReps && !w) return;
    const newS = ex.isReps ? calcRepsScore(r, ex.s) : calcScore(w, r, ex.s);
    const old  = prs[ex.id];
    const oldS = old ? getExScore(ex, old) : -1;
    setPrs(p => ({ ...p, [ex.id]: { weight:w, reps:r, date:todayISO() } }));
    setEditing(null); setWeight(""); setReps("");
    if (newS > oldS) { setFlashId(ex.id); setTimeout(() => setFlashId(null), 600); }
  };

  return (
    <div className="scroll fi">
      <div className="card" style={{ marginBottom:14, background:"linear-gradient(135deg,rgba(56,189,248,.07),rgba(0,0,0,0))" }}>
        <div className="h2" style={{ marginBottom:4 }}>Personal Records</div>
        <div style={{ fontSize:14, color:"var(--text2)" }}>
          Standards from <strong style={{ color:"var(--acc)" }}>strengthlevel.de</strong> — millions of real lifters.
        </div>
      </div>

      <div className="fbar">
        {["All",...MUSCLES].map(m => (
          <button key={m} className={`fpill ${filter===m?"active":""}`} onClick={() => setFilter(m)}>{m}</button>
        ))}
      </div>

      {filtered.map(ex => {
        const pr    = prs[ex.id];
        const score = pr ? getExScore(ex, pr) : 0;
        const rank  = getRank(score);
        const isOpen  = editing === ex.id;
        const isFlash = flashId === ex.id;
        const hist    = (prHistory[ex.id] || []).slice(-5);

        const preview = isOpen
          ? (ex.isReps
              ? calcRepsScore(Number(reps)||0, ex.s)
              : (weight && reps ? calcScore(Number(weight), Number(reps), ex.s) : null))
          : null;

        const improvement = pr && hist.length >= 2
          ? (() => {
              const first = hist[0];
              const firstS = getExScore(ex, first);
              const diff   = score - firstS;
              return diff > 0 ? `+${Math.round(diff)} pts since first log` : null;
            })()
          : null;

        return (
          <div key={ex.id} className={`clist ${isFlash?"pop":""}`}
            style={{ borderColor:pr ? rank.color+"28":"var(--bdr)", marginBottom:8 }}>
            <div className="row" style={{ cursor:"pointer" }} onClick={() => isOpen ? setEditing(null) : startEdit(ex)}>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:600, fontSize:15, color:"#fff" }}>{ex.name}</div>
                <div style={{ fontSize:12, color:"var(--muted)", marginTop:1 }}>{ex.muscle}</div>
                {pr && (
                  <div style={{ marginTop:4, display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                    <Badge score={score} />
                    <span style={{ fontSize:11, color:"var(--muted)" }}>Top {scoreToTopPct(score)}%</span>
                    {improvement && <span style={{ fontSize:11, color:"var(--grn)" }}>{improvement}</span>}
                  </div>
                )}
                {/* sparkline */}
                {hist.length >= 2 && (
                  <div className="sparkline" style={{ height:24, marginTop:6 }}>
                    {hist.map((h, i) => {
                      const s = getExScore(ex, h);
                      const max = Math.max(...hist.map(hh => getExScore(ex, hh)), 1);
                      return <div key={i} className="spark-bar" style={{ height:`${(s/max)*100}%`, background:rank.color+"88" }} />;
                    })}
                    <span style={{ fontSize:10, color:"var(--muted)", marginLeft:4, alignSelf:"flex-end" }}>history</span>
                  </div>
                )}
              </div>
              <div style={{ textAlign:"right", marginRight:12 }}>
                {pr ? (
                  ex.isReps
                    ? <div style={{ fontFamily:"var(--head)", fontSize:20, fontWeight:700, color:rank.color }}>{pr.reps} reps</div>
                    : <div style={{ fontFamily:"var(--head)", fontSize:20, fontWeight:700, color:rank.color }}>{pr.weight} kg × {pr.reps}</div>
                ) : <span style={{ fontSize:13, color:"var(--muted)" }}>No PR</span>}
                {pr && <div style={{ fontFamily:"var(--head)", fontSize:13, color:"var(--muted)" }}>Score {score}</div>}
              </div>
              <div style={{ color:"var(--muted)", fontSize:14 }}>{isOpen?"▲":"▼"}</div>
            </div>

            {isOpen && (
              <div style={{ padding:"0 16px 16px" }}>
                <div className="note"><span className="note-i">ℹ</span><span>{ex.note}</span></div>
                <div style={{ height:12 }} />

                {ex.isReps ? (
                  <div className="fg">
                    <label className="flbl">Reps (bodyweight)</label>
                    <input className="finp" type="number" value={reps} onChange={e=>setReps(e.target.value)} placeholder="e.g. 10" />
                  </div>
                ) : (
                  <div className="fr2" style={{ marginBottom:12 }}>
                    <div><label className="flbl">Weight (kg)</label><input className="finp" type="number" value={weight} onChange={e=>setWeight(e.target.value)} placeholder="e.g. 80" /></div>
                    <div><label className="flbl">Reps</label><input className="finp" type="number" value={reps} onChange={e=>setReps(e.target.value)} placeholder="e.g. 5" /></div>
                  </div>
                )}

                {preview !== null && (
                  <div className="hint" style={{ marginBottom:12 }}>
                    Estimated rank: <strong style={{ color:getRank(preview).color }}>{getRank(preview).name}</strong>
                    {" · "}Score: <strong style={{ color:getRank(preview).color }}>{Math.round(preview)}</strong>
                    {" · "}Top: <strong style={{ color:getRank(preview).color }}>{scoreToTopPct(preview)}%</strong>
                    <br />Reference: Novice {ex.isReps ? ex.s.nov+" reps" : ex.s.nov+" kg"} · Advanced {ex.isReps ? ex.s.adv+" reps" : ex.s.adv+" kg"} · Elite {ex.isReps ? ex.s.eli+" reps" : ex.s.eli+" kg"}
                  </div>
                )}
                <button className="btn" style={{ fontSize:13 }} onClick={() => save(ex)}>Save PR</button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════  PR CELEBRATION MODAL  */
function PRModal({ newPRs, onClose }) {
  if (!newPRs || newPRs.length === 0) return null;
  return (
    <div style={{
      position:"fixed", inset:0, zIndex:1000,
      background:"rgba(0,0,0,0.75)", backdropFilter:"blur(4px)",
      display:"flex", alignItems:"center", justifyContent:"center", padding:20,
    }}>
      <div style={{
        background:"var(--surf)", border:"1px solid rgba(251,191,36,0.4)",
        borderRadius:16, padding:"28px 24px", maxWidth:380, width:"100%",
        boxShadow:"0 0 60px rgba(251,191,36,0.15)",
        animation:"popIn .35s cubic-bezier(0.175,0.885,0.32,1.275)",
      }}>
        {/* Fireworks header */}
        <div style={{ textAlign:"center", marginBottom:20 }}>
          <div style={{ fontSize:52, lineHeight:1, marginBottom:8 }}>🏆</div>
          <div style={{
            fontFamily:"var(--head)", fontSize:28, fontWeight:800,
            color:"var(--gld)", letterSpacing:1, marginBottom:4,
          }}>
            {newPRs.length === 1 ? "New Personal Record!" : `${newPRs.length} New Records!`}
          </div>
          <div style={{ fontSize:14, color:"var(--text2)" }}>
            You crushed it today. Keep going! 💪
          </div>
        </div>

        {/* PR list */}
        <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:20 }}>
          {newPRs.map((pr, i) => {
            const r = getRank(pr.newScore);
            const improved = pr.oldScore > 0;
            return (
              <div key={i} style={{
                background:`linear-gradient(135deg, ${r.bg}, rgba(0,0,0,0))`,
                border:`1px solid ${r.color}40`,
                borderRadius:10, padding:"12px 14px",
              }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                  <div>
                    <div style={{ fontWeight:600, fontSize:15, color:"#fff", marginBottom:3 }}>{pr.name}</div>
                    <div style={{ fontFamily:"var(--head)", fontSize:20, fontWeight:800, color:r.color }}>
                      {pr.isReps ? `${pr.reps} reps` : `${pr.weight} kg × ${pr.reps}`}
                    </div>
                    {!pr.isReps && (
                      <div style={{ fontSize:12, color:"var(--muted)", marginTop:2 }}>
                        Est. 1RM: {Math.round(epley1RM(pr.weight, pr.reps))} kg
                      </div>
                    )}
                  </div>
                  <div style={{ textAlign:"right" }}>
                    <span className="badge" style={{ color:r.color, borderColor:r.color+"44", background:r.bg }}>
                      {r.name}
                    </span>
                    {improved && (
                      <div style={{ fontSize:12, color:"var(--grn)", marginTop:4 }}>
                        +{Math.round(pr.newScore - pr.oldScore)} pts
                      </div>
                    )}
                    {!improved && (
                      <div style={{ fontSize:12, color:"var(--gld)", marginTop:4 }}>First PR!</div>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        <button className="btn" onClick={onClose}>
          Back to Log
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════  TRAINING LOG  */
function LogTab({ sessions, setSessions, prs, setPrs }) {
  const [view, setView]       = useState("list");
  const [expanded, setExp]    = useState(null);
  const [sDate, setDate]      = useState(todayISO());
  const [sNote, setNote]      = useState("");
  const [entries, setEnt]     = useState([{ exId: ALL_EX[0].id, sets:[{weight:"",reps:""}] }]);
  const [celebPRs, setCelebPRs] = useState(null); // null = hidden, array = show modal

  const addEntry   = () => setEnt(p=>[...p,{exId:ALL_EX[0].id,sets:[{weight:"",reps:""}]}]);
  const rmEntry    = i  => setEnt(p=>p.filter((_,j)=>j!==i));
  const setEx      = (i,v)    => setEnt(p=>p.map((e,j)=>j===i?{...e,exId:v}:e));
  const addSet     = i        => setEnt(p=>p.map((e,j)=>j===i?{...e,sets:[...e.sets,{weight:"",reps:""}]}:e));
  const rmSet      = (i,s)    => setEnt(p=>p.map((e,j)=>j===i?{...e,sets:e.sets.filter((_,k)=>k!==s)}:e));
  const updSet     = (i,s,f,v)=> setEnt(p=>p.map((e,j)=>j===i?{...e,sets:e.sets.map((st,k)=>k===s?{...st,[f]:v}:st)}:e));

  // Compute the best set score for a given entry's sets against the exercise definition
  const bestSetScore = (entry) => {
    const ex = ALL_EX.find(x => x.id === entry.exId);
    if (!ex) return 0;
    return entry.sets.reduce((best, set) => {
      const w = Number(set.weight) || 0;
      const r = Number(set.reps)   || 0;
      if (!r) return best;
      const s = ex.isReps ? calcRepsScore(r, ex.s) : calcScore(w, r, ex.s);
      return s > best ? s : best;
    }, 0);
  };

  // Compute the best single set (weight+reps) for an entry — highest estimated 1RM
  const bestSet = (entry) => {
    const ex = ALL_EX.find(x => x.id === entry.exId);
    if (!ex) return null;
    let best = null, bestVal = -1;
    for (const set of entry.sets) {
      const w = Number(set.weight) || 0;
      const r = Number(set.reps)   || 0;
      if (!r) continue;
      const val = ex.isReps ? r : epley1RM(w, r);
      if (val > bestVal) { bestVal = val; best = { weight:w, reps:r }; }
    }
    return best;
  };

  // Is a particular set a PR for this exercise?
  const isSetPR = (exId, weight, reps) => {
    const ex = ALL_EX.find(x => x.id === exId);
    if (!ex || !reps) return false;
    const existingPR = prs[exId];
    const newScore   = ex.isReps ? calcRepsScore(reps, ex.s) : calcScore(weight, reps, ex.s);
    const oldScore   = existingPR ? getExScore(ex, existingPR) : 0;
    return newScore > oldScore;
  };

  const save = () => {
    const clean = entries.map(en => {
      const ex   = ALL_EX.find(x => x.id === en.exId);
      const sets = en.sets.filter(s => s.reps).map(s => ({
        weight: Number(s.weight) || 0,
        reps:   Number(s.reps),
      }));
      return sets.length ? { exId:en.exId, name:ex.name, muscle:ex.muscle, sets } : null;
    }).filter(Boolean);
    if (!clean.length) return;

    // ── Detect & save new PRs ──────────────────────────────────────────
    const newPRsList = [];
    const updatedPRs = { ...prs };

    for (const entry of clean) {
      const ex = ALL_EX.find(x => x.id === entry.exId);
      if (!ex) continue;

      // Find the best set in this session entry (highest e1RM / most reps)
      let bestW = 0, bestR = 0, bestVal = -1;
      for (const set of entry.sets) {
        const w = set.weight, r = set.reps;
        const val = ex.isReps ? r : epley1RM(w, r);
        if (val > bestVal) { bestVal = val; bestW = w; bestR = r; }
      }
      if (!bestR) continue;

      const newScore = ex.isReps ? calcRepsScore(bestR, ex.s) : calcScore(bestW, bestR, ex.s);
      const existingPR = updatedPRs[ex.id];
      const oldScore   = existingPR ? getExScore(ex, existingPR) : 0;

      if (newScore > oldScore) {
        // This is a new PR — save it automatically with today's date
        updatedPRs[ex.id] = { weight: bestW, reps: bestR, date: sDate };
        newPRsList.push({
          id:       ex.id,
          name:     ex.name,
          muscle:   ex.muscle,
          isReps:   !!ex.isReps,
          weight:   bestW,
          reps:     bestR,
          newScore,
          oldScore,
        });
      }
    }

    if (newPRsList.length > 0) {
      setPrs(updatedPRs);
    }
    // ──────────────────────────────────────────────────────────────────

    const totalVol  = clean.reduce((s,e) => s + e.sets.reduce((ss,st) => ss + st.weight * st.reps, 0), 0);
    const totalSets = clean.reduce((s,e) => s + e.sets.length, 0);

    // Tag session with which exercises set new PRs
    const prExIds = new Set(newPRsList.map(p => p.id));
    setSessions(prev => [{
      id:       Date.now(),
      date:     sDate,
      note:     sNote,
      exercises: clean,
      totalVol,
      totalSets,
      newPRIds: [...prExIds],   // stored so the session card can show PR badges
    }, ...prev]);

    // Reset form state
    setDate(todayISO()); setNote("");
    setEnt([{ exId: ALL_EX[0].id, sets:[{weight:"",reps:""}] }]);

    // Show modal if there are new PRs, otherwise go straight to list
    if (newPRsList.length > 0) {
      setCelebPRs(newPRsList);
      setView("list");
    } else {
      setView("list");
    }
  };

  if (view === "add") return (
    <div className="scroll fi">
      <div style={{ display:"flex",alignItems:"center",gap:12,marginBottom:16 }}>
        <button className="btn-g" onClick={()=>setView("list")}>← Back</button>
        <div className="h2">New Session</div>
      </div>
      <div className="fr2" style={{ marginBottom:12 }}>
        <div className="fg"><label className="flbl">Date</label><input className="finp" type="date" value={sDate} onChange={e=>setDate(e.target.value)} /></div>
        <div className="fg"><label className="flbl">Label (optional)</label><input className="finp" value={sNote} onChange={e=>setNote(e.target.value)} placeholder="e.g. Push Day" /></div>
      </div>
      <Lbl>Exercises</Lbl>
      {entries.map((entry, ei) => {
        const ex = ALL_EX.find(x => x.id === entry.exId);
        // Check if any set in this entry is a live PR
        const liveSetPRFlags = entry.sets.map(set => {
          const w = Number(set.weight) || 0;
          const r = Number(set.reps)   || 0;
          return r > 0 && isSetPR(entry.exId, w, r);
        });
        const anyLivePR = liveSetPRFlags.some(Boolean);

        return (
          <div key={ei} style={{
            background:"var(--bg)", borderRadius:8, padding:12, marginBottom:8,
            border: anyLivePR
              ? "1px solid rgba(251,191,36,0.5)"
              : "1px solid var(--bdr)",
            transition:"border-color .3s",
          }}>
            <div style={{ display:"flex",gap:8,alignItems:"center",marginBottom:8 }}>
              <select className="fsel" style={{ flex:1 }} value={entry.exId} onChange={e => setEx(ei, e.target.value)}>
                {MUSCLES.map(m => (
                  <optgroup key={m} label={m}>
                    {EX[m].map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
                  </optgroup>
                ))}
              </select>
              <button className="btn-i" onClick={() => rmEntry(ei)}>✕</button>
            </div>

            {/* Exercise hint */}
            {ex && <div style={{ fontSize:12,color:"var(--text2)",marginBottom:10,paddingLeft:2 }}>ℹ {ex.note}</div>}

            {/* Live PR banner — shown as soon as any set beats the current PR */}
            {anyLivePR && (
              <div style={{
                display:"flex", alignItems:"center", gap:8,
                background:"rgba(251,191,36,0.1)", border:"1px solid rgba(251,191,36,0.35)",
                borderRadius:7, padding:"8px 12px", marginBottom:10,
                animation:"fadeUp .25s ease",
              }}>
                <span style={{ fontSize:20 }}>🏆</span>
                <div>
                  <div style={{ fontFamily:"var(--head)", fontSize:14, fontWeight:700, color:"var(--gld)" }}>
                    New Personal Record!
                  </div>
                  <div style={{ fontSize:12, color:"var(--text2)" }}>
                    This set beats your previous best — it will be saved automatically.
                  </div>
                </div>
              </div>
            )}

            {/* Sets */}
            {entry.sets.map((set, si) => {
              const w   = Number(set.weight) || 0;
              const r   = Number(set.reps)   || 0;
              const isPR = r > 0 && isSetPR(entry.exId, w, r);
              return (
                <div key={si} style={{ display:"flex",gap:8,alignItems:"center",marginBottom:6 }}>
                  <div style={{
                    fontSize:12, width:18, textAlign:"center", flexShrink:0,
                    color: isPR ? "var(--gld)" : "var(--muted)",
                    fontWeight: isPR ? 700 : 400,
                  }}>
                    {isPR ? "★" : si + 1}
                  </div>
                  {!ex?.isReps && (
                    <input
                      className="finp" type="number"
                      value={set.weight}
                      onChange={e => updSet(ei, si, "weight", e.target.value)}
                      placeholder="kg"
                      style={{ flex:1, borderColor: isPR ? "rgba(251,191,36,0.5)" : undefined }}
                    />
                  )}
                  <input
                    className="finp" type="number"
                    value={set.reps}
                    onChange={e => updSet(ei, si, "reps", e.target.value)}
                    placeholder="reps"
                    style={{ flex:1, borderColor: isPR ? "rgba(251,191,36,0.5)" : undefined }}
                  />
                  <button className="btn-i" onClick={() => rmSet(ei, si)} style={{ flexShrink:0 }}>−</button>
                </div>
              );
            })}
            <button className="btn-i" style={{ fontSize:12,width:"100%",marginTop:4 }} onClick={() => addSet(ei)}>+ Set</button>
          </div>
        );
      })}
      <button className="btn-g" style={{ width:"100%",marginBottom:10,marginTop:4 }} onClick={addEntry}>+ Add Exercise</button>
      <button className="btn" onClick={save}>Save Session</button>
    </div>
  );

  return (
    <>
      {/* PR Celebration Modal */}
      {celebPRs && (
        <PRModal
          newPRs={celebPRs}
          onClose={() => setCelebPRs(null)}
        />
      )}

      <div className="scroll fi">
        <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16 }}>
          <div className="h2">Training Log</div>
          <button className="btn" style={{ width:"auto",padding:"9px 18px",fontSize:13 }} onClick={()=>setView("add")}>+ New Session</button>
        </div>

        {sessions.length === 0 ? (
          <div className="empty"><span className="empty-i">📋</span>No sessions yet.<br />Tap <strong style={{ color:"var(--acc)" }}>New Session</strong> to start.</div>
        ) : sessions.map(s => {
          const hasPRs = s.newPRIds && s.newPRIds.length > 0;
          return (
            <div key={s.id} className="sess" style={{ borderColor: hasPRs ? "rgba(251,191,36,0.3)" : undefined }}>
              <div className="sess-h" onClick={()=>setExp(expanded===s.id?null:s.id)}>
                <div style={{ flex:1 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <div style={{ fontFamily:"var(--head)",fontSize:17,fontWeight:700,color:"#fff" }}>
                      {s.note || "Workout"}
                    </div>
                    {hasPRs && (
                      <div style={{
                        fontFamily:"var(--head)", fontSize:11, fontWeight:700,
                        color:"var(--gld)", background:"rgba(251,191,36,0.12)",
                        border:"1px solid rgba(251,191,36,0.35)",
                        borderRadius:20, padding:"2px 8px", letterSpacing:"0.5px",
                      }}>
                        🏆 {s.newPRIds.length} PR{s.newPRIds.length > 1 ? "s" : ""}
                      </div>
                    )}
                  </div>
                  <div style={{ fontSize:12,color:"var(--muted)",marginTop:2 }}>
                    {fmtDate(s.date)} · {s.exercises.length} exercises · {s.totalSets} sets
                  </div>
                </div>
                <div style={{ textAlign:"right", marginLeft:8 }}>
                  <div style={{ fontFamily:"var(--head)",fontSize:16,fontWeight:700,color:"var(--acc)" }}>
                    {s.totalVol>=1000 ? (s.totalVol/1000).toFixed(1)+"t" : s.totalVol+" kg"}
                  </div>
                  <div style={{ fontSize:11,color:"var(--muted)" }}>volume</div>
                </div>
              </div>

              {expanded === s.id && (
                <div className="sess-b">
                  {s.exercises.map((e, i) => {
                    const isPREx = s.newPRIds && s.newPRIds.includes(e.exId);
                    return (
                      <div key={i} className="sess-row" style={{ borderColor: isPREx ? "rgba(251,191,36,0.2)" : undefined }}>
                        <div>
                          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                            <div style={{ fontWeight:600 }}>{e.name}</div>
                            {isPREx && <span style={{ fontSize:13 }}>🏆</span>}
                          </div>
                          <div style={{ fontSize:12,color:"var(--muted)" }}>{e.muscle}</div>
                        </div>
                        <div style={{ textAlign:"right" }}>
                          {e.sets.map((st,si)=>(
                            <div key={si} style={{ fontSize:13 }}>
                              {st.weight > 0 ? `${st.weight} kg × ${st.reps}` : `${st.reps} reps`}
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                  <button className="btn-d" style={{ marginTop:10 }}
                    onClick={() => setSessions(p => p.filter(x => x.id !== s.id))}>
                    Delete
                  </button>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </>
  );
}

/* ═══════════════════════════════════════════════════════════  CHART COMPONENTS  */
function SVGAreaChart({ data, color, height=80 }) {
  if (!data || data.length < 2) return (
    <div style={{ height, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <span style={{ fontSize:12, color:"#4a5e72" }}>Need at least 2 data points</span>
    </div>
  );
  const W=340, PADt=8, PADb=18, PADl=4, PADr=6;
  const cW=W-PADl-PADr, cH=height-PADt-PADb;
  const vals=data.map(d=>d.value), minV=Math.min(...vals), maxV=Math.max(...vals), rng=maxV-minV||1;
  const gx=i=>PADl+(i/(data.length-1))*cW;
  const gy=v=>PADt+cH-((v-minV)/rng)*cH;
  const pts=data.map((d,i)=>`${gx(i)},${gy(d.value)}`).join(" ");
  const area=data.map((d,i)=>`${i===0?"M":"L"}${gx(i)},${gy(d.value)}`).join(" ")+
    ` L${gx(data.length-1)},${height-PADb} L${gx(0)},${height-PADb} Z`;
  const gid="ag"+color.replace(/[^a-zA-Z0-9]/g,"");
  return (
    <svg viewBox={`0 0 ${W} ${height}`} preserveAspectRatio="none" style={{ width:"100%",height,display:"block" }}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.28" />
          <stop offset="100%" stopColor={color} stopOpacity="0.02" />
        </linearGradient>
      </defs>
      <line x1={PADl} y1={PADt} x2={W-PADr} y2={PADt} stroke="#1c2838" strokeWidth="1" />
      <line x1={PADl} y1={PADt+cH/2} x2={W-PADr} y2={PADt+cH/2} stroke="#1c2838" strokeWidth="1" />
      <path d={area} fill={`url(#${gid})`} />
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
      {data.map((d,i)=><circle key={i} cx={gx(i)} cy={gy(d.value)} r="2.5" fill={color} />)}
      <text x={gx(0)} y={height-3} fontSize="8" fill="#4a5e72" textAnchor="start">{fmtShort(data[0].date)}</text>
      <text x={gx(data.length-1)} y={height-3} fontSize="8" fill="#4a5e72" textAnchor="end">{fmtShort(data[data.length-1].date)}</text>
      <text x={W-PADr} y={gy(maxV)+9} fontSize="8" fill="#4a5e72" textAnchor="end">{maxV}</text>
      <text x={W-PADr} y={gy(minV)-3} fontSize="8" fill="#4a5e72" textAnchor="end">{minV}</text>
    </svg>
  );
}

/* ═══════════════════════════════════════════════════════════  STATS TAB  */
function StatsTab({ sessions, prs, prHistory }) {
  const hasSessions = sessions.length > 0;
  const hasPRs      = Object.keys(prs).length > 0;
  const [weekPage,  setWeekPage]  = useState(0);
  const [ovlExId,   setOvlExId]   = useState("");

  const stats = useMemo(() => {
    if (!hasSessions) return null;
    const sorted   = [...sessions].sort((a,b)=>a.date.localeCompare(b.date));
    const total    = sessions.length;
    const totalVol = sessions.reduce((s,x)=>s+x.totalVol,0);
    const totalSets= sessions.reduce((s,x)=>s+x.totalSets,0);
    const avgVol   = Math.round(totalVol/total);

    // Streak
    const dateSet = new Set(sessions.map(s=>s.date));
    let streak=0;
    for(let i=0;i<365;i++){
      const d=new Date(); d.setDate(d.getDate()-i);
      const iso=d.toISOString().slice(0,10);
      if(dateSet.has(iso)) streak++; else if(i>0) break;
    }
    // Best streak ever
    const allDates = [...dateSet].sort();
    let bestStreak=0, cur=0;
    for(let i=0;i<allDates.length;i++){
      if(i===0){ cur=1; continue; }
      const prev=new Date(allDates[i-1]+"T00:00:00");
      const this_=new Date(allDates[i]+"T00:00:00");
      const diff=(this_-prev)/86400000;
      if(diff===1) cur++; else cur=1;
      if(cur>bestStreak) bestStreak=cur;
    }
    bestStreak=Math.max(bestStreak,streak);

    // Monthly sessions (last 6 months)
    const months=[];
    for(let i=5;i>=0;i--){
      const d=new Date(); d.setMonth(d.getMonth()-i);
      const key=d.toISOString().slice(0,7);
      const lbl=d.toLocaleDateString("en-US",{month:"short"});
      months.push({ key, lbl, count:sessions.filter(s=>s.date.startsWith(key)).length });
    }

    const daysSince=Math.max(1,Math.ceil((new Date()-new Date(sorted[0].date+"T00:00:00"))/86400000));
    const avgPerWeek=(total/Math.max(1,daysSince/7)).toFixed(1);
    const consistency=Math.min(100,Math.round((total/daysSince)*7*25));

    // Volume over last 6 months
    const volByMonth=months.map(m=>({
      ...m,
      vol:sessions.filter(s=>s.date.startsWith(m.key)).reduce((s,x)=>s+x.totalVol,0)
    }));

    // Muscle volume
    const muscleVol={};
    sessions.forEach(s=>s.exercises.forEach(e=>{
      const vol=e.sets.reduce((s,st)=>s+st.weight*st.reps,0);
      muscleVol[e.muscle]=(muscleVol[e.muscle]||0)+vol;
    }));
    const topMuscles=Object.entries(muscleVol).sort((a,b)=>b[1]-a[1]);

    // Exercise frequency
    const exFreq={};
    sessions.forEach(s=>s.exercises.forEach(e=>{exFreq[e.name]=(exFreq[e.name]||0)+1;}));
    const topEx=Object.entries(exFreq).sort((a,b)=>b[1]-a[1]).slice(0,5);

    // PR count by muscle
    const prByMuscle=MUSCLES.reduce((acc,m)=>({...acc,[m]:EX[m].filter(e=>prs[e.id]).length}),{});

    return { total,totalVol,totalSets,avgVol,streak,bestStreak,months,avgPerWeek,consistency,volByMonth,topMuscles,topEx,prByMuscle,daysSince };
  }, [sessions, prs]);

  // Muscle balance
  const muscleBalance = useMemo(() => {
    return MUSCLES.map(m => ({
      muscle:m,
      score: getMuscleScore(m, prs),
      prCount: EX[m].filter(e => prs[e.id]).length,
      total: EX[m].length,
    }));
  }, [prs]);

  const overallScore = useMemo(() => {
    const f = muscleBalance.filter(m => m.score > 0);
    return f.length ? Math.round(f.reduce((s,m) => s+m.score, 0) / f.length) : 0;
  }, [muscleBalance]);

  // Top PRs
  const topPRs = useMemo(() => {
    return ALL_EX.filter(e=>prs[e.id])
      .map(e => { const pr=prs[e.id]; const score=getExScore(e,pr); return {...e,pr,score}; })
      .sort((a,b)=>b.score-a.score).slice(0,6);
  }, [prs]);

  const COLORS=["var(--acc)","var(--grn)","var(--gld)","#a855f7","var(--red)","#f97316"];

  const weekdayFreq = useMemo(() => {
    const days=["Mo","Tu","We","Th","Fr","Sa","Su"], counts=new Array(7).fill(0);
    sessions.forEach(s=>{ const d=new Date(s.date+"T00:00:00"); counts[(d.getDay()+6)%7]++; });
    return days.map((d,i)=>({label:d,count:counts[i]}));
  }, [sessions]);

  const weeklyVols = useMemo(() => {
    const weeks=[]; const today=new Date();
    for(let w=15;w>=0;w--){
      const mon=new Date(today);
      mon.setDate(today.getDate()-((today.getDay()+6)%7)-w*7); mon.setHours(0,0,0,0);
      const sun=new Date(mon); sun.setDate(mon.getDate()+6);
      const s=mon.toISOString().slice(0,10), e=sun.toISOString().slice(0,10);
      const vol=sessions.filter(x=>x.date>=s&&x.date<=e).reduce((a,x)=>a+x.totalVol,0);
      weeks.push({startISO:s,vol,label:fmtShort(s)});
    }
    return weeks;
  }, [sessions]);

  const ovlExercises = useMemo(() =>
    ALL_EX.filter(e=>!e.isReps&&prHistory&&prHistory[e.id]&&
      (prHistory[e.id]||[]).filter(p=>p.date&&p.weight>0).length>=2),
  [prHistory]);

  const ovlData = useMemo(() => {
    if(!ovlExId||!prHistory||!prHistory[ovlExId]) return [];
    const ex=ALL_EX.find(x=>x.id===ovlExId); if(!ex) return [];
    return [...prHistory[ovlExId]]
      .filter(p=>p.date&&p.weight>0&&p.reps>0)
      .map(p=>({date:p.date,value:Math.round(epley1RM(p.weight,p.reps)*10)/10}))
      .sort((a,b)=>a.date.localeCompare(b.date));
  }, [ovlExId, prHistory]);

  if (!hasSessions && !hasPRs) {
    return (
      <div className="scroll fi">
        <div className="empty"><span className="empty-i">📊</span>No data yet.<br />Log sessions and set PRs to see your statistics.</div>
      </div>
    );
  }

  return (
    <div className="scroll fi">
      {/* Overall rank highlight */}
      {overallScore > 0 && (
        <div className="card" style={{ marginBottom:14, background:`linear-gradient(135deg, ${getRank(overallScore).bg}, rgba(0,0,0,0))`, borderColor:getRank(overallScore).color+"30", textAlign:"center" }}>
          <div style={{ fontFamily:"var(--head)", fontSize:13, letterSpacing:2, color:"var(--muted)", marginBottom:4 }}>OVERALL RANK</div>
          <div style={{ fontFamily:"var(--head)", fontSize:48, fontWeight:800, color:getRank(overallScore).color, lineHeight:1 }}>{overallScore}</div>
          <div style={{ fontFamily:"var(--head)", fontSize:18, fontWeight:700, color:getRank(overallScore).color, marginBottom:8 }}>{getRank(overallScore).name}</div>
          <div style={{ display:"flex", justifyContent:"center", gap:8 }}>
            <div className="top-pct" style={{ background:`${getRank(overallScore).color}18`, border:`1px solid ${getRank(overallScore).color}44`, color:getRank(overallScore).color }}>
              Top {scoreToTopPct(overallScore)}% worldwide
            </div>
          </div>
        </div>
      )}

      {stats && (
        <>
          {/* Streak */}
          <div className="streak">
            <div className="streak-n">{stats.streak}</div>
            <div>
              <div style={{ fontFamily:"var(--head)", fontSize:20, fontWeight:700, color:"#fff", marginBottom:2 }}>Day Streak 🔥</div>
              <div style={{ fontSize:14, color:"var(--text2)" }}>Best ever: {stats.bestStreak} days</div>
            </div>
          </div>

          {/* Key metrics */}
          <div className="sg3">
            <div className="sbox"><div className="sval">{stats.total}</div><div className="slbl">Sessions</div></div>
            <div className="sbox"><div className="sval">{stats.avgPerWeek}</div><div className="slbl">Per Week</div></div>
            <div className="sbox"><div className="sval">{Object.keys(prs).length}</div><div className="slbl">PRs Set</div></div>
          </div>

          <div className="sg2">
            <div className="sbox">
              <div className="sval" style={{ fontSize:22 }}>{stats.totalVol>=1000?(stats.totalVol/1000).toFixed(1):stats.totalVol}<span className="sunit">{stats.totalVol>=1000?"t":"kg"}</span></div>
              <div className="slbl">Total Volume</div>
            </div>
            <div className="sbox">
              <div className="sval" style={{ fontSize:22 }}>{stats.consistency}<span className="sunit">%</span></div>
              <div className="slbl">Consistency</div>
            </div>
          </div>

          <div className="sg2">
            <div className="sbox">
              <div className="sval" style={{ fontSize:22 }}>{stats.avgVol>=1000?(stats.avgVol/1000).toFixed(1):stats.avgVol}<span className="sunit">{stats.avgVol>=1000?"t":"kg"}</span></div>
              <div className="slbl">Avg Vol/Session</div>
            </div>
            <div className="sbox">
              <div className="sval" style={{ fontSize:22 }}>{Math.round(stats.totalSets/stats.total)}</div>
              <div className="slbl">Avg Sets/Session</div>
            </div>
          </div>

          {/* Sessions per month bar chart */}
          <Lbl>Sessions per Month</Lbl>
          <div className="card">
            <div className="vchart" style={{ height:90 }}>
              {stats.months.map(m => {
                const max = Math.max(...stats.months.map(x=>x.count), 1);
                return (
                  <div key={m.key} className="vbw">
                    <div className="vb" style={{ height:`${(m.count/max)*74}px`, background:m.count>0?"linear-gradient(180deg,var(--acc),rgba(56,189,248,.3))":"var(--bdr)" }} />
                    <div className="vl">{m.lbl}</div>
                  </div>
                );
              })}
            </div>
            <div style={{ fontSize:12, color:"var(--muted)", marginTop:10, textAlign:"center" }}>
              {stats.avgPerWeek} sessions/week · {stats.totalSets} total sets · {stats.daysSince} days active
            </div>
          </div>

          {/* Training by Day of Week */}
          <Lbl>Training by Day of Week</Lbl>
          <div className="card">
            {weekdayFreq.map(({label,count})=>{
              const max=Math.max(...weekdayFreq.map(d=>d.count),1);
              return (
                <div key={label} className="wday-row">
                  <span className="wday-lbl">{label}</span>
                  <div className="wday-track">
                    <div className="wday-fill" style={{ width:`${(count/max)*100}%`, background:"var(--acc)" }} />
                  </div>
                  <span className="wday-cnt">{count}</span>
                </div>
              );
            })}
          </div>

          {/* Volume per month */}
          <Lbl>Monthly Volume (kg)</Lbl>
          <div className="card">
            <div className="vchart" style={{ height:90 }}>
              {stats.volByMonth.map(m => {
                const max = Math.max(...stats.volByMonth.map(x=>x.vol), 1);
                return (
                  <div key={m.key} className="vbw">
                    <div className="vb" style={{ height:`${(m.vol/max)*74}px`, background:m.vol>0?"linear-gradient(180deg,var(--grn),rgba(52,211,153,.3))":"var(--bdr)" }} />
                    <div className="vl">{m.lbl}</div>
                  </div>
                );
              })}
            </div>
            <div style={{ fontSize:12, color:"var(--muted)", marginTop:10, textAlign:"center" }}>
              Peak month: {Math.max(...stats.volByMonth.map(m=>m.vol)).toLocaleString()} kg
            </div>
          </div>

          {/* Weekly Volume — paginated */}
          <Lbl>Weekly Volume</Lbl>
          <div className="card">
            {(() => {
              const pageSize=8, total=weeklyVols.length;
              const totalPages=Math.ceil(total/pageSize);
              const pageData=weeklyVols.slice(weekPage*pageSize,(weekPage+1)*pageSize);
              const maxVol=Math.max(...weeklyVols.map(w=>w.vol),1);
              return (
                <>
                  <div className="vchart" style={{ height:90 }}>
                    {pageData.map(w=>(
                      <div key={w.startISO} className="vbw">
                        <div className="vb" style={{ height:`${(w.vol/maxVol)*74}px`, background:w.vol>0?"linear-gradient(180deg,#a855f7,rgba(168,85,247,.3))":"var(--bdr)" }} />
                        <div className="vl">{w.label}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10 }}>
                    <button className="nav-arrow" onClick={()=>setWeekPage(p=>Math.max(0,p-1))} disabled={weekPage===0}>‹</button>
                    <span style={{ fontSize:12,color:"var(--muted)" }}>
                      Weeks {weekPage*pageSize+1}–{Math.min((weekPage+1)*pageSize,total)} of {total}
                    </span>
                    <button className="nav-arrow" onClick={()=>setWeekPage(p=>Math.min(totalPages-1,p+1))} disabled={weekPage>=totalPages-1}>›</button>
                  </div>
                </>
              );
            })()}
          </div>

          {/* Volume by muscle */}
          {stats.topMuscles.length > 0 && (
            <>
              <Lbl>Volume by Muscle Group</Lbl>
              <div className="clist">
                {stats.topMuscles.map(([muscle,vol],i) => {
                  const max=stats.topMuscles[0][1]; const c=COLORS[i]||"var(--muted)";
                  return (
                    <div key={muscle} className="row">
                      <div style={{ width:20,textAlign:"center",fontFamily:"var(--head)",fontWeight:700,color:"var(--muted)",fontSize:13 }}>{i+1}</div>
                      <div style={{ flex:1,marginLeft:10 }}>
                        <div style={{ fontWeight:600,marginBottom:4 }}>{muscle}</div>
                        <div style={{ height:4,background:"var(--bdr)",borderRadius:2,overflow:"hidden" }}>
                          <div style={{ height:"100%",width:`${(vol/max)*100}%`,background:c,borderRadius:2 }} />
                        </div>
                      </div>
                      <div style={{ fontFamily:"var(--head)",fontWeight:700,fontSize:15,color:c,marginLeft:10 }}>
                        {vol>=1000?(vol/1000).toFixed(1)+"t":vol+" kg"}
                      </div>
                    </div>
                  );
                })}
              </div>
            </>
          )}

          {/* Top exercises */}
          {stats.topEx.length > 0 && (
            <>
              <Lbl>Most Trained Exercises</Lbl>
              <div className="clist">
                {stats.topEx.map(([name,count],i) => (
                  <div key={name} className="row">
                    <div style={{ display:"flex",alignItems:"center",gap:10 }}>
                      <div style={{ width:20,textAlign:"center",fontFamily:"var(--head)",fontWeight:700,color:"var(--muted)",fontSize:13 }}>{i+1}</div>
                      <div style={{ fontWeight:600 }}>{name}</div>
                    </div>
                    <div style={{ fontFamily:"var(--head)",fontWeight:700,fontSize:14,color:"var(--acc)" }}>{count}× logged</div>
                  </div>
                ))}
              </div>
            </>
          )}
        </>
      )}

      {/* Progressive Overload */}
      {ovlExercises.length > 0 && (
        <>
          <Lbl>Progressive Overload</Lbl>
          <div className="card">
            <label className="flbl">Select Exercise</label>
            <select className="ovl-picker" value={ovlExId} onChange={e=>setOvlExId(e.target.value)}>
              <option value="">— Choose an exercise —</option>
              {MUSCLES.map(m=>(
                <optgroup key={m} label={m}>
                  {(EX[m]||[]).filter(e=>!e.isReps&&prHistory&&prHistory[e.id]&&
                    (prHistory[e.id]||[]).filter(p=>p.date&&p.weight>0).length>=2).map(e=>(
                    <option key={e.id} value={e.id}>{e.name}</option>
                  ))}
                </optgroup>
              ))}
            </select>
            {ovlExId && ovlData.length >= 2 ? (
              <>
                <div style={{ fontSize:12,color:"var(--text2)",marginBottom:8 }}>
                  Est. 1RM trend — <strong style={{ color:"var(--acc)" }}>{ALL_EX.find(e=>e.id===ovlExId)?.name}</strong>
                </div>
                <SVGAreaChart data={ovlData} color="#38bdf8" height={90} />
                <div style={{ display:"flex",justifyContent:"space-between",marginTop:8,fontSize:12 }}>
                  <span style={{ color:"var(--muted)" }}>Start: <strong style={{ color:"var(--text)" }}>{ovlData[0]?.value} kg</strong></span>
                  <span style={{ color:ovlData[ovlData.length-1]?.value>=ovlData[0]?.value?"var(--grn)":"var(--red)",fontWeight:700 }}>
                    {ovlData[ovlData.length-1]?.value>=ovlData[0]?.value?"▲":"▼"}
                    {" "}{Math.abs(Math.round((ovlData[ovlData.length-1]?.value-ovlData[0]?.value)*10)/10)} kg
                  </span>
                  <span style={{ color:"var(--muted)" }}>Now: <strong style={{ color:"var(--text)" }}>{ovlData[ovlData.length-1]?.value} kg</strong></span>
                </div>
              </>
            ) : ovlExId ? (
              <div style={{ textAlign:"center",padding:"20px 0",color:"var(--muted)",fontSize:13 }}>
                Need at least 2 PR entries for this exercise.
              </div>
            ) : null}
          </div>
        </>
      )}

      {/* Muscle Balance */}
      <Lbl>Muscle Balance</Lbl>
      <div className="card">
        {muscleBalance.map(({muscle,score,prCount,total}) => {
          const r = getRank(score);
          return (
            <div key={muscle} className="balance-item">
              <div className="balance-label">{muscle}</div>
              <div className="balance-track" style={{ flex:1 }}>
                <div className="balance-fill" style={{ width:`${score}%`, background:r.color, boxShadow:`0 0 4px ${r.color}44` }} />
              </div>
              <div style={{ fontFamily:"var(--head)", fontSize:13, fontWeight:700, color:r.color, minWidth:30, textAlign:"right" }}>{score}</div>
              <div style={{ fontSize:11, color:"var(--muted)", minWidth:36, textAlign:"right" }}>{prCount}/{total}</div>
            </div>
          );
        })}
        <div style={{ fontSize:12,color:"var(--text2)",marginTop:10,borderTop:"1px solid var(--bdr)",paddingTop:10 }}>
          {(() => {
            const scores = muscleBalance.filter(m=>m.score>0).map(m=>m.score);
            if (scores.length < 2) return "Log more PRs across all muscle groups to see your balance.";
            const avg = scores.reduce((s,x)=>s+x,0)/scores.length;
            const max = Math.max(...scores), min = Math.min(...scores);
            const diff = max - min;
            if (diff < 20) return "✅ Your muscle development is well-balanced! Keep it up.";
            if (diff < 40) return "⚠️ Slight imbalance detected. Focus on your weaker muscle groups.";
            return "🔴 Significant imbalance. Prioritize your underdeveloped muscles to prevent injury.";
          })()}
        </div>
      </div>

      {/* Top PRs */}
      {topPRs.length > 0 && (
        <>
          <Lbl>Top PRs by Score</Lbl>
          <div className="clist">
            {topPRs.map((ex,i) => {
              const r=getRank(ex.score);
              return (
                <div key={ex.id} className="row">
                  <div style={{ width:20,textAlign:"center",fontFamily:"var(--head)",fontWeight:700,color:"var(--muted)",fontSize:13 }}>{i+1}</div>
                  <div style={{ flex:1,marginLeft:10 }}>
                    <div style={{ fontWeight:600 }}>{ex.name}</div>
                    <div style={{ fontSize:12,color:"var(--muted)" }}>{ex.muscle} · {fmtDate(ex.pr.date)}</div>
                  </div>
                  <div style={{ textAlign:"right" }}>
                    <div style={{ fontFamily:"var(--head)",fontWeight:700,color:r.color,fontSize:16 }}>
                      {ex.isReps ? ex.pr.reps+" reps" : ex.pr.weight+" kg × "+ex.pr.reps}
                    </div>
                    <div style={{ display:"flex",gap:6,justifyContent:"flex-end",marginTop:2 }}>
                      <Badge score={ex.score} />
                      <span style={{ fontSize:11,color:"var(--muted)",alignSelf:"center" }}>Top {scoreToTopPct(ex.score)}%</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════  ACHIEVEMENTS TAB  */
function AchievementsTab({ prs, sessions }) {
  const overall = useMemo(() => {
    const scores = MUSCLES.map(m => getMuscleScore(m, prs)).filter(s => s > 0);
    return scores.length ? Math.round(scores.reduce((s,x) => s+x, 0) / scores.length) : 0;
  }, [prs]);

  const results = useMemo(() =>
    ACHIEVEMENTS.map(a => ({ ...a, done: a.check(prs, sessions, overall) }))
  , [prs, sessions, overall]);

  const doneCount = results.filter(a => a.done).length;
  const pct = Math.round((doneCount / ACHIEVEMENTS.length) * 100);

  const fact = useMemo(() => FUN_FACTS[Math.floor(Date.now()/86400000) % FUN_FACTS.length], []);

  return (
    <div className="scroll fi">
      {/* Header */}
      <div className="card" style={{ marginBottom:14, background:"linear-gradient(135deg,rgba(251,191,36,.08),rgba(0,0,0,0))", borderColor:"rgba(251,191,36,.25)", textAlign:"center" }}>
        <div style={{ fontFamily:"var(--head)", fontSize:40, lineHeight:1, marginBottom:8 }}>🏆</div>
        <div className="h2" style={{ marginBottom:4 }}>Achievements</div>
        <div style={{ fontSize:14, color:"var(--text2)", marginBottom:12 }}>
          {doneCount} of {ACHIEVEMENTS.length} unlocked
        </div>
        <div className="bar-t" style={{ height:8 }}>
          <div className="bar-f" style={{ width:`${pct}%`, background:"var(--gld)", boxShadow:"0 0 8px rgba(251,191,36,.5)" }} />
        </div>
        <div style={{ fontSize:12, color:"var(--muted)", marginTop:6 }}>{pct}% complete</div>
      </div>

      {/* Done */}
      {results.filter(a => a.done).length > 0 && (
        <>
          <Lbl>Unlocked ({doneCount})</Lbl>
          {results.filter(a => a.done).map(a => (
            <div key={a.id} className="ach done">
              <div className="ach-icon">{a.icon}</div>
              <div style={{ flex:1 }}>
                <div className="ach-title">{a.title}</div>
                <div className="ach-desc">{a.desc}</div>
              </div>
              <div className="ach-done-badge">✓ DONE</div>
            </div>
          ))}
        </>
      )}

      {/* Locked */}
      {results.filter(a => !a.done).length > 0 && (
        <>
          <Lbl>Locked ({ACHIEVEMENTS.length - doneCount})</Lbl>
          {results.filter(a => !a.done).map(a => (
            <div key={a.id} className="ach locked">
              <div className="ach-icon">🔒</div>
              <div style={{ flex:1 }}>
                <div className="ach-title">{a.title}</div>
                <div className="ach-desc">{a.desc}</div>
              </div>
            </div>
          ))}
        </>
      )}

      {/* Fun fact at bottom */}
      <Lbl>Did You Know?</Lbl>
      <div className="fact" style={{ marginBottom:0 }}>
        <span className="fact-i">{fact.icon}</span>
        <span className="fact-t">{fact.text}</span>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════  1RM CALCULATOR TAB  */
const FORMULAS_1RM = [
  { name:"Epley",    desc:"Most popular, good for 4–12 reps",         calc:(w,r)=>r===1?w:w*(1+r/30) },
  { name:"Brzycki",  desc:"Good for low reps (1–10)",                  calc:(w,r)=>r===1?w:w*(36/(37-r)) },
  { name:"Lombardi", desc:"Tends to be more conservative",             calc:(w,r)=>r===1?w:w*Math.pow(r,0.1) },
  { name:"O'Conner", desc:"Good for higher reps (10+)",                calc:(w,r)=>r===1?w:w*(1+r/40) },
  { name:"Mayhew",   desc:"Developed specifically for bench press",    calc:(w,r)=>r===1?w:(100*w)/(52.2+41.9*Math.exp(-0.055*r)) },
];
const PCT_TABLE = [100,97.5,95,92.5,90,87.5,85,80,75,70,65,60,55,50];
const REP_RECS  = {100:"1",97.5:"1–2",95:"2–3",92.5:"3",90:"3–4",87.5:"4",85:"5",80:"6–8",75:"8–10",70:"10–12",65:"12–15",60:"15–20",55:"20+",50:"20+"};

function OneRMTab({ prs }) {
  const [weight,     setWeight]     = useState("");
  const [reps,       setReps]       = useState("");
  const [activeForm, setActiveForm] = useState("Epley");
  const [quickExId,  setQuickExId]  = useState("");

  const w = parseFloat(weight) || 0;
  const r = parseInt(reps, 10) || 0;

  const results = useMemo(() => {
    if (!w || !r || r < 1 || r > 30) return null;
    return FORMULAS_1RM.map(f => ({ name:f.name, desc:f.desc, result:Math.round(f.calc(w,r)*10)/10 }));
  }, [w, r]);

  const avg1RM = useMemo(() => {
    if (!results) return null;
    return Math.round(results.reduce((s,x)=>s+x.result,0)/results.length*10)/10;
  }, [results]);

  const active1RM = useMemo(() => {
    if (!results) return null;
    return results.find(x=>x.name===activeForm)?.result ?? avg1RM;
  }, [results, activeForm, avg1RM]);

  const prExercises = useMemo(() =>
    ALL_EX.filter(e=>prs[e.id]&&!e.isReps).slice(0,20),
  [prs]);

  const loadFromPR = exId => {
    const pr = prs[exId]; if (!pr) return;
    setWeight(String(pr.weight)); setReps(String(pr.reps)); setQuickExId(exId);
  };

  return (
    <div className="scroll fi">
      <div className="card" style={{ marginBottom:14, background:"linear-gradient(135deg,rgba(251,191,36,.08),rgba(0,0,0,0))", borderColor:"rgba(251,191,36,.25)" }}>
        <div className="h2" style={{ marginBottom:4 }}>1RM Calculator</div>
        <div style={{ fontSize:14, color:"var(--text2)" }}>Estimate your one-rep max from any working set using 5 formulas.</div>
      </div>

      {prExercises.length > 0 && (
        <>
          <Lbl>Load from PR</Lbl>
          <div style={{ display:"flex",gap:8,overflowX:"auto",paddingBottom:8,marginBottom:10,scrollbarWidth:"none" }}>
            {prExercises.map(ex=>(
              <div key={ex.id} className={`pr-chip ${quickExId===ex.id?"pactive":""}`} onClick={()=>loadFromPR(ex.id)}>
                <div className="pr-chip-name">{ex.name}</div>
                <div className="pr-chip-val">{prs[ex.id].weight} kg × {prs[ex.id].reps}</div>
              </div>
            ))}
          </div>
        </>
      )}

      <Lbl>Weight & Reps</Lbl>
      <div className="card">
        <div className="fr2">
          <div><label className="flbl">Weight (kg)</label>
            <input className="finp" type="number" value={weight} onChange={e=>setWeight(e.target.value)} placeholder="e.g. 100" />
          </div>
          <div><label className="flbl">Reps</label>
            <input className="finp" type="number" value={reps} onChange={e=>setReps(e.target.value)} placeholder="e.g. 5" />
          </div>
        </div>
        {r > 30 && <div style={{ fontSize:12,color:"var(--red)",marginTop:6 }}>⚠ Estimates become inaccurate above 30 reps.</div>}
      </div>

      {results && (
        <>
          <Lbl>Results — Average of All Formulas</Lbl>
          <div className="onerm-avg">
            <div style={{ fontSize:11,letterSpacing:2,color:"var(--muted)",fontFamily:"var(--head)",marginBottom:6 }}>Ø ESTIMATED 1RM</div>
            <div className="onerm-big">{avg1RM} <span style={{ fontSize:24 }}>kg</span></div>
            <div style={{ fontSize:11,color:"var(--muted)",marginTop:4 }}>Average of {FORMULAS_1RM.length} formulas</div>
          </div>

          <Lbl>By Formula</Lbl>
          <div className="card" style={{ padding:"0 16px" }}>
            {results.map(res=>(
              <div key={res.name} className={`formula-row ${activeForm===res.name?"factive":""}`} onClick={()=>setActiveForm(res.name)}>
                <div style={{ flex:1 }}>
                  <div style={{ fontFamily:"var(--head)",fontSize:14,fontWeight:700,color:activeForm===res.name?"var(--acc)":"var(--text)",marginBottom:2 }}>{res.name}</div>
                  <div style={{ fontSize:11,color:"var(--muted)" }}>{res.desc}</div>
                </div>
                <div style={{ fontFamily:"var(--head)",fontSize:18,fontWeight:800,color:activeForm===res.name?"var(--acc)":"var(--text2)" }}>{res.result} kg</div>
              </div>
            ))}
          </div>

          <Lbl>Training Weights — based on {activeForm}</Lbl>
          <div className="pct-table">
            <div className="pct-row pct-hdr">
              <div className="pct-cell" style={{ color:"var(--muted)" }}>%</div>
              <div className="pct-cell" style={{ color:"var(--muted)" }}>Weight</div>
              <div className="pct-cell" style={{ color:"var(--muted)" }}>Reps</div>
            </div>
            {PCT_TABLE.map(pct=>{
              const kg=Math.round((active1RM*pct/100)*4)/4;
              const isMax=pct===100;
              return (
                <div key={pct} className="pct-row" style={{ background:isMax?"rgba(251,191,36,.06)":undefined }}>
                  <div className="pct-cell" style={{ color:isMax?"var(--gld)":"var(--text)",fontWeight:isMax?800:600 }}>{pct}%</div>
                  <div className="pct-cell" style={{ color:isMax?"var(--gld)":"var(--text)",fontWeight:isMax?800:600 }}>{kg} kg</div>
                  <div className="pct-cell" style={{ color:"var(--muted)" }}>{REP_RECS[pct]??""}</div>
                </div>
              );
            })}
          </div>
        </>
      )}

      {!results && (
        <div className="empty">
          <span className="empty-i">💡</span>
          Enter weight and reps above to calculate your estimated 1RM.
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════  BODY MEASUREMENTS TAB  */
const MEAS_FIELDS = [
  { key:"chest",  label:"Chest",   color:"#38bdf8" },
  { key:"waist",  label:"Waist",   color:"#34d399" },
  { key:"hips",   label:"Hips",    color:"#fbbf24" },
  { key:"arms",   label:"Arms",    color:"#a855f7" },
  { key:"thighs", label:"Thighs",  color:"#f97316" },
  { key:"calves", label:"Calves",  color:"#fc5c7d" },
];

function BodyMeasurementsTab({ bodyMeasurements, setBodyMeasurements }) {
  const [inputs,      setInputs]      = useState({});
  const [entryDate,   setEntryDate]   = useState(todayISO());
  const [activeChart, setActiveChart] = useState("chest");

  const sorted = useMemo(() =>
    [...bodyMeasurements].sort((a,b)=>b.date.localeCompare(a.date)),
  [bodyMeasurements]);

  const latestEntry = sorted[0] ?? null;

  const chartData = useMemo(() => {
    const field = activeChart;
    return [...bodyMeasurements]
      .filter(e => e[field] > 0)
      .sort((a,b) => a.date.localeCompare(b.date))
      .map(e => ({ date:e.date, value:e[field] }));
  }, [bodyMeasurements, activeChart]);

  const saveEntry = () => {
    const hasAny = MEAS_FIELDS.some(f => Number(inputs[f.key]) > 0);
    if (!hasAny) { alert("Please enter at least one measurement."); return; }
    const entry = { date: entryDate };
    MEAS_FIELDS.forEach(f => { entry[f.key] = Number(inputs[f.key]) || 0; });
    setBodyMeasurements(prev => {
      const existing = prev.find(e => e.date === entryDate) ?? {};
      const without  = prev.filter(e => e.date !== entryDate);
      return [...without, { ...existing, ...entry }].sort((a,b) => a.date.localeCompare(b.date));
    });
    setInputs({});
    alert(`Measurements saved for ${fmtDate(entryDate)}!`);
  };

  const deleteEntry = date => {
    if (confirm(`Delete measurements for ${fmtDate(date)}?`)) {
      setBodyMeasurements(prev => prev.filter(e => e.date !== date));
    }
  };

  return (
    <div className="scroll fi">
      <div className="card" style={{ marginBottom:14, background:"linear-gradient(135deg,rgba(168,85,247,.08),rgba(0,0,0,0))", borderColor:"rgba(168,85,247,.25)" }}>
        <div className="h2" style={{ marginBottom:4 }}>📏 Body Measurements</div>
        <div style={{ fontSize:14, color:"var(--text2)" }}>Track your measurements in cm over time.</div>
      </div>

      {latestEntry && (
        <>
          <Lbl>Latest — {fmtDate(latestEntry.date)}</Lbl>
          <div className="meas-grid">
            {MEAS_FIELDS.map(f => {
              const val = latestEntry[f.key]; if (!val) return null;
              const prev = sorted[1]?.[f.key];
              const delta = prev ? val - prev : null;
              return (
                <div key={f.key} className="meas-cell" style={{ borderColor:f.color+"40" }}>
                  <div className="meas-val" style={{ color:f.color }}>{val}</div>
                  <div style={{ fontSize:10,color:"var(--muted)" }}>cm</div>
                  <div className="meas-lbl">{f.label}</div>
                  {delta !== null && delta !== 0 && (
                    <div className="meas-delta" style={{ color:delta<0?"var(--grn)":"var(--red)" }}>
                      {delta>0?"+":""}{delta.toFixed(1)}
                    </div>
                  )}
                </div>
              );
            }).filter(Boolean)}
          </div>
        </>
      )}

      {bodyMeasurements.length >= 2 && (
        <>
          <Lbl>Progress Chart</Lbl>
          <div className="meas-tabs">
            {MEAS_FIELDS.map(f=>(
              <button key={f.key}
                className="meas-tab"
                style={{ color:activeChart===f.key?f.color:"var(--muted)", borderBottomColor:activeChart===f.key?f.color:"transparent", background:activeChart===f.key?f.color+"10":"none" }}
                onClick={()=>setActiveChart(f.key)}>
                {f.label}
              </button>
            ))}
          </div>
          <div className="card">
            {chartData.length >= 2
              ? <SVGAreaChart data={chartData} color={MEAS_FIELDS.find(f=>f.key===activeChart)?.color||"#38bdf8"} height={90} />
              : <div style={{ textAlign:"center",padding:"20px 0",color:"var(--muted)",fontSize:13 }}>Need at least 2 entries for this measurement.</div>
            }
          </div>
        </>
      )}

      <Lbl>New Entry</Lbl>
      <div className="card">
        <div className="fg">
          <label className="flbl">Date</label>
          <input className="finp" type="date" value={entryDate} onChange={e=>setEntryDate(e.target.value)} max={todayISO()} />
        </div>
        <div className="sg2" style={{ gap:8 }}>
          {MEAS_FIELDS.map(f=>(
            <div key={f.key} className="fg" style={{ marginBottom:8 }}>
              <label className="flbl" style={{ color:f.color }}>{f.label} (cm)</label>
              <input
                className="finp" type="number"
                value={inputs[f.key]??""}
                onChange={e=>setInputs(p=>({...p,[f.key]:e.target.value}))}
                placeholder={latestEntry?.[f.key]?String(latestEntry[f.key]):"—"}
                style={{ borderColor:inputs[f.key]?f.color+"60":undefined }}
              />
            </div>
          ))}
        </div>
        <button className="btn" onClick={saveEntry}>Save Measurements</button>
      </div>

      {sorted.length > 0 && (
        <>
          <Lbl>All Entries ({sorted.length})</Lbl>
          <div className="clist">
            <div className="row" style={{ background:"var(--bg2)",padding:"8px 16px" }}>
              <div style={{ flex:1.5,fontSize:11,color:"var(--muted)",fontFamily:"var(--head)",fontWeight:700,letterSpacing:1 }}>DATE</div>
              {MEAS_FIELDS.slice(0,3).map(f=>(
                <div key={f.key} style={{ flex:1,fontSize:11,color:f.color,fontFamily:"var(--head)",fontWeight:700,textAlign:"center" }}>{f.label.slice(0,3).toUpperCase()}</div>
              ))}
              <div style={{ width:36 }} />
            </div>
            {sorted.slice(0,15).map((entry,i)=>(
              <div key={entry.date} className="row" style={{ background:i===0?"rgba(56,189,248,.03)":undefined }}>
                <div style={{ flex:1.5,fontSize:13,color:"var(--text2)" }}>{fmtShort(entry.date)}</div>
                {MEAS_FIELDS.slice(0,3).map(f=>(
                  <div key={f.key} style={{ flex:1,fontSize:13,textAlign:"center",color:entry[f.key]?"var(--text)":"var(--muted)" }}>
                    {entry[f.key]||"—"}
                  </div>
                ))}
                <button className="btn-d" style={{ padding:"3px 8px",fontSize:11 }} onClick={()=>deleteEntry(entry.date)}>✕</button>
              </div>
            ))}
            {sorted.length > 15 && (
              <div style={{ fontSize:11,color:"var(--muted)",textAlign:"center",padding:8 }}>Showing newest 15 entries</div>
            )}
          </div>
        </>
      )}
      <div style={{ height:20 }} />
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════  ROOT  */
const TABS = [
  { id:"dashboard",    label:"Home"   },
  { id:"prs",          label:"PRs"    },
  { id:"log",          label:"Log"    },
  { id:"stats",        label:"Stats"  },
  { id:"achievements", label:"Awards" },
  { id:"onerm",        label:"1RM"    },
  { id:"measurements", label:"Maße"   },
];

function IronRank() {
  const [tab, setTab] = useState("dashboard");

  // ── Persistent state via localStorage ──────────────────────────────
  const load = (key, fallback) => {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
    catch { return fallback; }
  };
  const [prs,              setPrsRaw]              = useState(() => load("ir_prs", {}));
  const [sessions,         setSessionsRaw]         = useState(() => load("ir_sessions", []));
  const [prHistory,        setPRHistoryRaw]        = useState(() => load("ir_prHistory", {}));
  const [bodyMeasurements, setBodyMeasurementsRaw] = useState(() => load("ir_measurements", []));

  const setPrs = v => {
    const next = typeof v === "function" ? v(prs) : v;
    setPrsRaw(next);
    try { localStorage.setItem("ir_prs", JSON.stringify(next)); } catch {}
  };
  const setSessions = v => {
    const next = typeof v === "function" ? v(sessions) : v;
    setSessionsRaw(next);
    try { localStorage.setItem("ir_sessions", JSON.stringify(next)); } catch {}
  };
  const setPRHistory = v => {
    const next = typeof v === "function" ? v(prHistory) : v;
    setPRHistoryRaw(next);
    try { localStorage.setItem("ir_prHistory", JSON.stringify(next)); } catch {}
  };
  const setBodyMeasurements = v => {
    const next = typeof v === "function" ? v(bodyMeasurements) : v;
    setBodyMeasurementsRaw(next);
    try { localStorage.setItem("ir_measurements", JSON.stringify(next)); } catch {}
  };
  // ───────────────────────────────────────────────────────────────────

  // Track PR history whenever prs changes
  useEffect(() => {
    setPRHistory(prev => {
      const next = { ...prev };
      Object.entries(prs).forEach(([id, pr]) => {
        if (!next[id]) next[id] = [];
        const last = next[id][next[id].length - 1];
        if (!last || last.weight !== pr.weight || last.reps !== pr.reps) {
          next[id] = [...next[id].slice(-9), { ...pr }];
        }
      });
      return next;
    });
  }, [prs]);

  const prCount  = Object.keys(prs).length;
  const sesCount = sessions.length;
  const overallScore = useMemo(() => {
    const scores = MUSCLES.map(m => getMuscleScore(m, prs)).filter(s => s > 0);
    return scores.length ? Math.round(scores.reduce((s,x) => s+x, 0) / scores.length) : 0;
  }, [prs]);
  const newAchs = useMemo(() => ACHIEVEMENTS.filter(a => a.check(prs, sessions, overallScore)).length, [prs, sessions, overallScore]);

  return (
    <>
      <style>{CSS}</style>
      <div className="app">
        <div className="hdr">
          <div>
            <div className="logo">IRON<em>RANK</em></div>
            <div className="logo-sub">Strength Tracker</div>
          </div>
          <div className="hdr-stats">
            <div><span>{prCount}</span> PRs · <span>{sesCount}</span> Sessions</div>
            {newAchs > 0 && <div style={{ color:"var(--gld)" }}>🏆 {newAchs} achievements</div>}
          </div>
        </div>

        <div className="nav">
          {TABS.map(t => (
            <button key={t.id} className={`nav-btn ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}>
              {t.label}
              {t.id==="achievements" && newAchs > 0 && <span style={{ marginLeft:3, color:"var(--gld)" }}>•</span>}
            </button>
          ))}
        </div>

        {tab==="dashboard"    && <DashboardTab    prs={prs} sessions={sessions} onNavigate={setTab} />}
        {tab==="prs"          && <PRsTab          prs={prs} setPrs={setPrs} prHistory={prHistory} />}
        {tab==="log"          && <LogTab          sessions={sessions} setSessions={setSessions} prs={prs} setPrs={setPrs} />}
        {tab==="stats"        && <StatsTab        sessions={sessions} prs={prs} prHistory={prHistory} />}
        {tab==="achievements" && <AchievementsTab prs={prs} sessions={sessions} />}
        {tab==="onerm"        && <OneRMTab        prs={prs} />}
        {tab==="measurements" && <BodyMeasurementsTab bodyMeasurements={bodyMeasurements} setBodyMeasurements={setBodyMeasurements} />}
      </div>
    </>
  );
}


    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<IronRank />);
  </script>

  <script>
    // Register service worker for offline support + PWA install
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js")
          .then(reg => console.log("SW registered:", reg.scope))
          .catch(err => console.log("SW failed:", err));
      });
    }
  </script>
</body>
</html>
