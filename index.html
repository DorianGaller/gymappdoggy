/* ═══════════════════════════════════════════════════════════  RANK SYSTEM  */
const RANKS = [
  { name:"Beginner",     pct:0,  color:"#718096", bg:"rgba(113,128,150,0.12)" },
  { name:"Novice",       pct:20, color:"#48bb78", bg:"rgba(72,187,120,0.12)"  },

  { name:"Pro",          pct:80, color:"#ed8936", bg:"rgba(237,137,54,0.12)"  },
  { name:"Elite",        pct:95, color:"#fc5c7d", bg:"rgba(252,92,125,0.12)"  },
];
const getRank    = p => [...RANKS].reverse().find(r => p >= r.pct) || RANKS[0];
const getNextRank= p => RANKS.find(r => p < r.pct) || null;

/* ═══════════════════════════════════════════════════════════  SCORE CALC  */
const epley1RM = (w, r) => w * (1 + Math.min(r, 30) / 30);
const scoreFromThresholds = (val, [t0, t1, t2, t3, t4, t5]) => {
  const thresholds = [0, t0, t1, t2, t3, t4, t5];
  const pctBands   = [0, 20, 40, 60, 80, 95, 100];
  for (let i = 1; i < thresholds.length; i++) {
    if (val <= thresholds[i]) {
      const lo = thresholds[i-1], hi = thresholds[i];
      const t  = lo === hi ? 1 : (val - lo) / (hi - lo);
      return Math.round((pctBands[i-1] + t * (pctBands[i] - pctBands[i-1])) * 10) / 10;
    }
  }
  return 100;
};
const calcScore = (weight, reps, s) => {
  if (!weight || !reps || weight <= 0 || reps <= 0) return 0;
  const e1rm = epley1RM(weight, reps);
  return Math.min(100, scoreFromThresholds(e1rm, [s.beg,s.nov,s.int,s.adv,s.pro,s.eli]));
};
const calcRepsScore = (reps, s) => {
  if (!reps || reps <= 0) return 0;
  return Math.min(100, scoreFromThresholds(reps, [s.beg,s.nov,s.int,s.adv,s.pro,s.eli]));
};
const getExScore = (ex, pr) => {
  if (!pr) return 0;
  return ex.isReps ? calcRepsScore(pr.reps, ex.s) : calcScore(pr.weight, pr.reps, ex.s);
};

/* ─── top % mapping: score 0→100 maps to top 100%→top 0.5% ─── */
const scoreToTopPct = s => {
  if (s <= 0)  return 100;
  if (s >= 95) return 1;
  if (s >= 80) return Math.round(1 + (95 - s) / 15 * 9);
  if (s >= 60) return Math.round(10 + (80 - s) / 20 * 20);
  if (s >= 40) return Math.round(30 + (60 - s) / 20 * 30);
  if (s >= 20) return Math.round(60 + (40 - s) / 20 * 30);
  return Math.round(90 + (20 - s) / 20 * 10);
};

const ALL_EX = Object.entries(EX).flatMap(([m, list]) => list.map(e => ({ ...e, muscle: m })));
const MUSCLES = Object.keys(EX);

const getMuscleScore = (muscle, prs) => {
  const list = EX[muscle] || [];
  return list.reduce((best, ex) => Math.max(best, getExScore(ex, prs[ex.id])), 0);
};

const fmtDate  = iso => { if (!iso) return ""; const d = new Date(iso+"T00:00:00"); return d.toLocaleDateString("en-US", {month:"short",day:"numeric",year:"numeric"}); };
const fmtShort = iso => { if (!iso) return ""; const d = new Date(iso+"T00:00:00"); return d.toLocaleDateString("en-US", {month:"short",day:"numeric"}); };
const weekChar = iso  => { const d = new Date(iso+"T00:00:00"); return ["Su","Mo","Tu","We","Th","Fr","Sa"][d.getDay()]; };

.sbox{background:var(--surf);border:1px solid var(--bdr);border-radius:10px;padding:14px 12px;text-align:center}

.sunit{font-size:13px;color:var(--muted);margin-left:2px}

/* form */

.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* buttons */

.btn:active{transform:scale(.99)}
.btn-g{padding:9px 16px;background:var(--surf2);border:1px solid var(--bdr2);border-radius:8px;color:var(--text);font-family:var(--body);font-size:14px;cursor:pointer;transition:border-color .18s}

/* streak */
