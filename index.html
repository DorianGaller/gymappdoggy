function DashboardTab({ prs, sessions, onNavigate, userProfile }) {
  const muscleScores = useMemo(() =>
    MUSCLES.map(m => ({ muscle:m, score:getMuscleScore(m,prs) })),
  [prs]);

  const overall = useMemo(() => {
    const f=muscleScores.filter(m=>m.score>0);
    return f.length ? Math.round(f.reduce((s,m)=>s+m.score,0)/f.length) : 0;
  }, [muscleScores]);

  const rank=getRank(overall), next=getNextRank(overall), topPct=scoreToTopPct(overall);

  const last7 = useMemo(() => {
    const dates=new Set(sessions.map(s=>s.date));
    return Array.from({length:7},(_,i)=>{
      const d=new Date(); d.setDate(d.getDate()-(6-i));
      const iso=d.toISOString().slice(0,10);
      return {iso,label:weekChar(iso),trained:dates.has(iso)};
    });
  }, [sessions]);

  const fact=useMemo(()=>FUN_FACTS[new Date().getDate()%FUN_FACTS.length],[]);
  const strongest=[...muscleScores].filter(m=>m.score>0).sort((a,b)=>b.score-a.score)[0];
  const weakest  =[...muscleScores].filter(m=>m.score>0).sort((a,b)=>a.score-b.score)[0];
  const ICONS={Chest:"◈",Back:"◉",Legs:"◆",Shoulders:"◇",Arms:"◈",Core:"◎"};

  // Last session calories
  const lastSession = sessions[0];
  const lastCals = lastSession ? estimateCalories(lastSession, userProfile?.weight||80) : null;

  return (
    <div className="scroll fi">
      <DevWarning />

      {/* Rank Hero */}
      <div className="rhero" style={{background:`linear-gradient(135deg,${rank.bg} 0%,rgba(0,0,0,0.2) 100%)`,border:`1px solid ${rank.color}30`}}>
        <span className="rnum" style={{color:rank.color,textShadow:`0 0 40px ${rank.color}55`}}>{overall}</span>
        <div className="rname" style={{color:rank.color}}>{rank.name}</div>
        {overall>0&&(
          <div style={{display:"flex",justifyContent:"center",marginBottom:12}}>
            <div className="top-pct" style={{background:`${rank.color}18`,border:`1px solid ${rank.color}44`,color:rank.color}}>
              Top {topPct}% weltweit
            </div>
          </div>
        )}
        {next?(
          <>
            <Bar pct={overall===0?0:((overall-rank.pct)/(next.pct-rank.pct))*100} color={rank.color} />
            <div style={{fontSize:12,color:"var(--muted)",marginTop:8}}>
              {next.pct-overall} Pkt bis <strong style={{color:next.color}}>{next.name}</strong>
            </div>
          </>
        ):(
          <div style={{fontSize:13,color:rank.color}}>Maximaler Rang erreicht 🏆</div>
        )}
        <div style={{fontSize:12,color:"var(--muted)",marginTop:6}}>
          Basierend auf {Object.keys(prs).length} PRs · {sessions.length} Einheiten
        </div>
      </div>

      {/* Quick stats row */}
      {lastCals && (
        <div className="sg2" style={{marginBottom:10}}>
          <div className="sbox" style={{borderColor:"rgba(244,63,94,.2)"}}>
            <div style={{fontSize:20,marginBottom:4}}>🔥</div>
            <div className="sval" style={{fontSize:22}}>{lastCals}<span className="sunit">kcal</span></div>
            <div className="slbl">Letzte Einheit (ca.)</div>
          </div>
          <div className="sbox" style={{borderColor:"rgba(52,211,153,.2)"}}>
            <div style={{fontSize:20,marginBottom:4}}>📅</div>
            <div className="sval" style={{fontSize:22}}>{last7.filter(d=>d.trained).length}<span className="sunit">/7</span></div>
            <div className="slbl">Tage diese Woche</div>
          </div>
        </div>
      )}

      {/* Fun Fact */}
      <div className="fact">
        <span className="fact-i">{fact.icon}</span>
        <span className="fact-t">{fact.text}</span>
      </div>

      {/* Week */}
      <Lbl>Diese Woche</Lbl>
      <div className="card">
        <div className="wdots">
          {last7.map(d=>(
            <div key={d.iso} className="wdot">
              <div className={`wdot-c ${d.trained?"tr":""}`}>{d.trained?"✓":""}</div>
              <div className={`wdot-l ${d.trained?"tr":""}`}>{d.label}</div>
            </div>
          ))}
        </div>
        <div style={{fontSize:13,color:"var(--text2)",textAlign:"center"}}>
          {last7.filter(d=>d.trained).length} von 7 Tagen trainiert
        </div>
      </div>

      {/* Muscle Scores */}
      <Lbl>Muskelgruppen</Lbl>
      {muscleScores.map(({muscle,score})=>{
        const r=getRank(score),tp=scoreToTopPct(score);
        return (
          <div key={muscle} className="card" style={{padding:"14px 16px",borderColor:score>0?r.color+"25":"var(--bdr)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:20,color:r.color}}>{ICONS[muscle]||"◎"}</span>
                <div>
                  <div className="h3">{muscle}</div>
                  {score>0?(
                    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}>
                      <Badge score={score} />
                      <span style={{fontSize:11,color:"var(--muted)"}}>Top {tp}%</span>
                    </div>
                  ):(
                    <span style={{fontSize:12,color:"var(--muted)"}}>Noch keine PRs</span>
                  )}
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"var(--head)",fontSize:30,fontWeight:800,color:score>0?r.color:"var(--muted)",lineHeight:1}}>{score}</div>
                <div style={{fontSize:11,color:"var(--muted)"}}>/ 100</div>
              </div>
            </div>
            <Bar pct={score} color={score>0?r.color:"var(--muted)"} />
          </div>
        );
      })}

      {/* Insights */}
      {overall>0&&(
        <>
          <Lbl>Einblicke</Lbl>
          <div className="sg2">
            {strongest&&(
              <div className="sbox" style={{borderColor:"rgba(52,211,153,.22)"}}>
                <div style={{fontSize:22,marginBottom:4}}>💪</div>
                <div className="slbl">Stärkste Gruppe</div>
                <div style={{fontFamily:"var(--head)",fontSize:18,fontWeight:700,color:"var(--grn)",marginTop:4}}>{strongest.muscle}</div>
                <div style={{fontSize:12,color:"var(--muted)"}}>Score {strongest.score}</div>
              </div>
            )}
            {weakest&&(
              <div className="sbox" style={{borderColor:"rgba(244,63,94,.22)"}}>
                <div style={{fontSize:22,marginBottom:4}}>🎯</div>
                <div className="slbl">Fokusbereich</div>
                <div style={{fontFamily:"var(--head)",fontSize:18,fontWeight:700,color:"var(--red)",marginTop:4}}>{weakest.muscle}</div>
                <div style={{fontSize:12,color:"var(--muted)"}}>Score {weakest.score}</div>
              </div>
            )}
          </div>
        </>
      )}

      {overall===0&&(
        <div style={{marginTop:10,background:"rgba(56,189,248,.05)",border:"1px solid rgba(56,189,248,.15)",borderRadius:10,padding:"24px 20px",textAlign:"center"}}>
          <div style={{fontSize:36,marginBottom:10}}>🏋️</div>
          <div className="h2" style={{marginBottom:6}}>Erstes PR eintragen</div>
          <div style={{fontSize:14,color:"var(--text2)"}}>Geh zum <strong style={{color:"var(--acc)"}}>PRs</strong>-Tab und trage deine besten Lifts ein, um deinen Stärke-Rang freizuschalten.</div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════  PRs TAB  */
function PRsTab({ prs, setPrs, prHistory, customExercises }) {
  const [filter,  setFilter]  = useState("All");
  const [search,  setSearch]  = useState("");
  const [editing, setEditing] = useState(null);
  const [weight,  setWeight]  = useState("");
  const [reps,    setReps]    = useState("");
  const [flashId, setFlashId] = useState(null);
  const [showSettings, setShowSettings] = useState(null); // exId
  const [unilateralIds, setUnilateralIds] = useState(() => {
    try { return JSON.parse(localStorage.getItem("ir_unilateral")||"[]"); } catch { return []; }
  });

  const toggleUnilateral = (id) => {
    const next = unilateralIds.includes(id) ? unilateralIds.filter(x=>x!==id) : [...unilateralIds,id];
    setUnilateralIds(next);
    try { localStorage.setItem("ir_unilateral", JSON.stringify(next)); } catch {}
  };

  const allExercises = useMemo(() => [
    ...ALL_EX,
    ...(customExercises||[]).map(ce => ({ ...ce, muscle: ce.muscle||"Custom", isCustom:true })),
  ], [customExercises]);

  const filtered = useMemo(() => {
    let list = filter==="All" ? allExercises : allExercises.filter(e=>e.muscle===filter||e.muscle==="Custom"&&filter==="Custom");
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(e => e.name.toLowerCase().includes(q));
    }
    return list;
  }, [filter, search, allExercises]);

  const filterGroups = ["All",...MUSCLES,"Custom"];

  const startEdit = ex => {
    const pr=prs[ex.id];
    setEditing(ex.id);
    setWeight(pr&&!ex.isReps?String(pr.weight):"");
    setReps(pr?String(pr.reps):"");
    setShowSettings(null);
  };

  const save = ex => {
    if (!reps) return;
    const w=ex.isReps?0:Number(weight);
    const r=Number(reps);
    if (!ex.isReps&&!w) return;
    const newS=ex.isReps?calcRepsScore(r,ex.s):calcScore(w,r,ex.s);
    const old=prs[ex.id];
    const oldS=old?getExScore(ex,old):-1;
    setPrs(p=>({...p,[ex.id]:{weight:w,reps:r,date:todayISO()}}));
    setEditing(null);setWeight("");setReps("");
    if (newS>oldS){setFlashId(ex.id);setTimeout(()=>setFlashId(null),600);}
  };

  const deletePR = id => { setPrs(p=>{const n={...p};delete n[id];return n;}); };

  const getLastSessionEntry = (exId) => {
    // Returns last training session where this exercise appeared (not just PR)
    return null; // would need session data – placeholder
  };

  return (
    <div className="scroll fi">
      <div className="card" style={{marginBottom:14,background:"linear-gradient(135deg,rgba(56,189,248,.07),rgba(0,0,0,0))"}}>
        <div className="h2" style={{marginBottom:4}}>Persönliche Rekorde</div>
        <div style={{fontSize:14,color:"var(--text2)"}}>
          Standards von <strong style={{color:"var(--acc)"}}>strengthlevel.de</strong> – Millionen echter Lifter.
        </div>
      </div>

      {/* Search */}
      <div className="search-wrap">
        <span className="search-icon">🔍</span>
        <input className="finp" type="text" placeholder="Übung suchen…" value={search} onChange={e=>setSearch(e.target.value)} style={{paddingLeft:36}} />
      </div>

      <div className="fbar">
        {filterGroups.map(m=>(
          <button key={m} className={`fpill ${filter===m?"active":""}`} onClick={()=>setFilter(m)}>{m}</button>
        ))}
      </div>

      {filtered.length===0&&(
        <div className="empty"><span className="empty-i">🔍</span>Keine Übungen gefunden.</div>
      )}

      {filtered.map(ex=>{
        const pr=prs[ex.id];
        const score=pr&&!ex.isCustom?getExScore(ex,pr):0;
        const rank=getRank(score);
        const isOpen=editing===ex.id;
        const isFlash=flashId===ex.id;
        const hist=(prHistory[ex.id]||[]).slice(-5);
        const isUni=unilateralIds.includes(ex.id);
        const showSet=showSettings===ex.id;

        const preview=isOpen
          ?(ex.isReps?calcRepsScore(Number(reps)||0,ex.s)
            :(weight&&reps?calcScore(Number(weight),Number(reps),ex.s):null))
          :null;

        // Improvement since first recorded
        const improvement=pr&&hist.length>=2
          ?(()=>{
              const first=hist[0];
              const firstS=getExScore(ex,first);
              const diff=score-firstS;
              return diff>0?`+${Math.round(diff)} Pkt seit erstem Log`:null;
            })()
          :null;

        // Previous PR for comparison
        const prevPR=hist.length>=2?hist[hist.length-2]:null;

        return (
          <div key={ex.id} className={`clist ${isFlash?"pop":""}`}
            style={{borderColor:pr?rank.color+"28":"var(--bdr)",marginBottom:8}}>
            <div className="row" style={{cursor:"pointer"}} onClick={()=>isOpen?setEditing(null):startEdit(ex)}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{fontWeight:600,fontSize:15,color:"#fff"}}>{ex.name}</div>
                  {isUni&&<span style={{fontSize:10,color:"var(--purp)",background:"rgba(168,85,247,.12)",border:"1px solid rgba(168,85,247,.3)",borderRadius:10,padding:"1px 6px"}}>unilateral</span>}
                  {ex.isCustom&&<span style={{fontSize:10,color:"var(--gld)",background:"rgba(251,191,36,.1)",border:"1px solid rgba(251,191,36,.25)",borderRadius:10,padding:"1px 6px"}}>eigene</span>}
                </div>
                <div style={{fontSize:12,color:"var(--muted)",marginTop:1}}>{ex.muscle}</div>
                {pr&&!ex.isCustom&&(
                  <div style={{marginTop:4,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <Badge score={score} />
                    <span style={{fontSize:11,color:"var(--muted)"}}>Top {scoreToTopPct(score)}%</span>
                    {improvement&&<span style={{fontSize:11,color:"var(--grn)"}}>{improvement}</span>}
                  </div>
                )}
                {/* Sparkline */}
                {hist.length>=2&&!ex.isCustom&&(
                  <div className="sparkline" style={{height:24,marginTop:6}}>
                    {hist.map((h,i)=>{
                      const s=getExScore(ex,h);
                      const max=Math.max(...hist.map(hh=>getExScore(ex,hh)),1);
                      return <div key={i} className="spark-bar" style={{height:`${(s/max)*100}%`,background:rank.color+"88"}} />;
                    })}
                    <span style={{fontSize:10,color:"var(--muted)",marginLeft:4,alignSelf:"flex-end"}}>Verlauf</span>
                  </div>
                )}
              </div>
              <div style={{textAlign:"right",marginRight:12}}>
                {pr?(
                  ex.isReps
                    ?<div style={{fontFamily:"var(--head)",fontSize:20,fontWeight:700,color:rank.color}}>{pr.reps} Wdh.</div>
                    :<div style={{fontFamily:"var(--head)",fontSize:20,fontWeight:700,color:rank.color}}>{pr.weight} kg × {pr.reps}</div>
                ):<span style={{fontSize:13,color:"var(--muted)"}}>Kein PR</span>}
                {pr&&!ex.isCustom&&<div style={{fontFamily:"var(--head)",fontSize:13,color:"var(--muted)"}}>Score {score}</div>}
              </div>
              <div style={{color:"var(--muted)",fontSize:14}}>{isOpen?"▲":"▼"}</div>
            </div>

            {isOpen&&(
              <div style={{padding:"0 16px 16px"}}>
                {/* Previous PR comparison */}
                {pr?(
                  <div className="impr-banner">
                    <span>📌</span>
                    <span>
                      Aktuell: {ex.isReps?`${pr.reps} Wdh.`:`${pr.weight} kg × ${pr.reps}`}
                      {!ex.isReps&&<> · Est. 1RM: {Math.round(epley1RM(pr.weight,pr.reps))} kg</>}
                      {" · "}{fmtDate(pr.date)}
                    </span>
                  </div>
                ):(
                  <div className="impr-banner none">
                    <span>ℹ️</span>
                    <span>Noch kein PR für diese Übung eingetragen.</span>
                  </div>
                )}
                {prevPR&&!ex.isCustom&&(
                  <div style={{fontSize:12,color:"var(--muted)",marginBottom:10}}>
                    Letzter Eintrag: {ex.isReps?`${prevPR.reps} Wdh.`:`${prevPR.weight} kg × ${prevPR.reps}`} ({fmtDate(prevPR.date)})
                    {" · "}
                    {(()=>{
                      const diffScore=score-getExScore(ex,prevPR);
                      if(diffScore>0) return <span style={{color:"var(--grn)"}}>+{Math.round(diffScore)} Pkt ↑</span>;
                      if(diffScore<0) return <span style={{color:"var(--red)"}}>{Math.round(diffScore)} Pkt ↓</span>;
                      return <span style={{color:"var(--muted)"}}>gleich</span>;
                    })()}
                  </div>
                )}

                {!ex.isCustom&&<div className="note"><span className="note-i">ℹ</span><span>{ex.note}</span></div>}
                <div style={{height:12}} />

                {ex.isReps?(
                  <div className="fg">
                    <label className="flbl">Wiederholungen (Körpergewicht)</label>
                    <input className="finp" type="number" inputMode="numeric" value={reps} onChange={e=>setReps(e.target.value)} placeholder="z.B. 10" />
                  </div>
                ):(
                  <div className="fr2" style={{marginBottom:12}}>
                    <div>
                      <label className="flbl">Gewicht (kg){isUni?" pro Seite":""}</label>
                      <input className="finp" type="number" inputMode="decimal" value={weight} onChange={e=>setWeight(e.target.value)} placeholder="z.B. 80" />
                    </div>
                    <div>
                      <label className="flbl">Wiederholungen</label>
                      <input className="finp" type="number" inputMode="numeric" value={reps} onChange={e=>setReps(e.target.value)} placeholder="z.B. 5" />
                    </div>
                  </div>
                )}

                {preview!==null&&!ex.isCustom&&(
                  <div className="hint" style={{marginBottom:12}}>
                    Rang: <strong style={{color:getRank(preview).color}}>{getRank(preview).name}</strong>
                    {" · "}Score: <strong style={{color:getRank(preview).color}}>{Math.round(preview)}</strong>
                    {" · "}Top: <strong style={{color:getRank(preview).color}}>{scoreToTopPct(preview)}%</strong>
                    <br />Referenz: Novice {ex.isReps?ex.s.nov+" Wdh.":ex.s.nov+" kg"} · Advanced {ex.isReps?ex.s.adv+" Wdh.":ex.s.adv+" kg"} · Elite {ex.isReps?ex.s.eli+" Wdh.":ex.s.eli+" kg"}
                  </div>
                )}

                <div style={{display:"flex",gap:8,marginBottom:8}}>
                  <button className="btn" style={{flex:1,fontSize:13}} onClick={()=>save(ex)}>PR speichern</button>
                  <button className="btn-i" title="Einstellungen" onClick={e=>{e.stopPropagation();setShowSettings(showSet?null:ex.id);}}>⚙️</button>
                </div>

                {showSet&&(
                  <div style={{background:"var(--bg2)",border:"1px solid var(--bdr)",borderRadius:8,padding:12,marginBottom:8}}>
                    <div style={{fontFamily:"var(--head)",fontSize:11,letterSpacing:2,color:"var(--muted)",marginBottom:10}}>ÜBUNGSEINSTELLUNGEN</div>
                    <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:14}}>
                      <input type="checkbox" checked={isUni} onChange={()=>toggleUnilateral(ex.id)} style={{width:18,height:18,accentColor:"var(--purp)"}} />
                      <span>Unilateral ausführen (z.B. einarmig)</span>
                    </label>
                    <div style={{fontSize:12,color:"var(--muted)",marginTop:4}}>
                      Markiert diese Übung als unilateral. Wirkt nur als Hinweis – die Gewichtswertung bleibt gleich.
                    </div>
                    {pr&&(
                      <button className="btn-d" style={{marginTop:10,width:"100%"}} onClick={()=>{if(window.confirm("PR löschen?"))deletePR(ex.id);}}>
                        PR löschen
                      </button>
                    )}
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════  PR CELEBRATION MODAL  */
function PRModal({ newPRs, onClose }) {
  if (!newPRs||newPRs.length===0) return null;
  return (
    <div style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(0,0,0,0.75)",backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"var(--surf)",border:"1px solid rgba(251,191,36,0.4)",borderRadius:16,padding:"28px 24px",maxWidth:380,width:"100%",boxShadow:"0 0 60px rgba(251,191,36,0.15)",animation:"popIn .35s cubic-bezier(0.175,0.885,0.32,1.275)"}}>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:52,lineHeight:1,marginBottom:8}}>🏆</div>
          <div style={{fontFamily:"var(--head)",fontSize:28,fontWeight:800,color:"var(--gld)",letterSpacing:1,marginBottom:4}}>
            {newPRs.length===1?"Neuer Persönlicher Rekord!":`${newPRs.length} Neue Rekorde!`}
          </div>
          <div style={{fontSize:14,color:"var(--text2)"}}>Du hast es heute zertrümmert. Weiter so! 💪</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
          {newPRs.map((pr,i)=>{
            const r=getRank(pr.newScore),improved=pr.oldScore>0;
            return (
              <div key={i} style={{background:`linear-gradient(135deg,${r.bg},rgba(0,0,0,0))`,border:`1px solid ${r.color}40`,borderRadius:10,padding:"12px 14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:15,color:"#fff",marginBottom:3}}>{pr.name}</div>
                    <div style={{fontFamily:"var(--head)",fontSize:20,fontWeight:800,color:r.color}}>
                      {pr.isReps?`${pr.reps} Wdh.`:`${pr.weight} kg × ${pr.reps}`}
                    </div>
                    {!pr.isReps&&<div style={{fontSize:12,color:"var(--muted)",marginTop:2}}>Est. 1RM: {Math.round(epley1RM(pr.weight,pr.reps))} kg</div>}
                  </div>
                  <div style={{textAlign:"right"}}>
                    <span className="badge" style={{color:r.color,borderColor:r.color+"44",background:r.bg}}>{r.name}</span>
                    {improved&&<div style={{fontSize:12,color:"var(--grn)",marginTop:4}}>+{Math.round(pr.newScore-pr.oldScore)} Pkt</div>}
                    {!improved&&<div style={{fontSize:12,color:"var(--gld)",marginTop:4}}>Erstes PR!</div>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
        <button className="btn" onClick={onClose}>Zurück zum Log</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════  SESSION SUMMARY  */
function SessionSummary({ session, onClose, userProfile }) {
  if (!session) return null;
  const calories = estimateCalories(session, userProfile?.weight||80);
  const topSet = session.exercises.reduce((best, e) => {
    const vol = e.sets.reduce((s,st)=>s+st.weight*st.reps,0);
    return vol>best.vol?{name:e.name,vol}:best;
  }, {name:"",vol:0});

  return (
    <div className="summary-overlay" onClick={onClose}>
      <div className="summary-sheet" onClick={e=>e.stopPropagation()}>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:40,lineHeight:1,marginBottom:8}}>✅</div>
          <div style={{fontFamily:"var(--head)",fontSize:24,fontWeight:800,color:"#fff",marginBottom:4}}>Einheit gespeichert!</div>
          <div style={{fontSize:14,color:"var(--text2)"}}>{fmtDate(session.date)} · {session.note||"Workout"}</div>
        </div>

        <div style={{background:"var(--bg2)",borderRadius:10,padding:"4px 0",marginBottom:16}}>
          <div className="summary-stat">
            <span style={{color:"var(--text2)"}}>Übungen</span>
            <span style={{fontFamily:"var(--head)",fontWeight:700,color:"#fff"}}>{session.exercises.length}</span>
          </div>
          <div className="summary-stat">
            <span style={{color:"var(--text2)"}}>Sätze gesamt</span>
            <span style={{fontFamily:"var(--head)",fontWeight:700,color:"#fff"}}>{session.totalSets}</span>
          </div>
          <div className="summary-stat">
            <span style={{color:"var(--text2)"}}>Volumen</span>
            <span style={{fontFamily:"var(--head)",fontWeight:700,color:"var(--acc)"}}>{session.totalVol>=1000?(session.totalVol/1000).toFixed(1)+"t":session.totalVol+" kg"}</span>
          </div>
          <div className="summary-stat">
            <span style={{color:"var(--text2)"}}>Kalorienverbrauch ca.</span>
            <span style={{fontFamily:"var(--head)",fontWeight:700,color:"var(--red)"}}>~{calories} kcal 🔥</span>
          </div>
          {session.newPRIds&&session.newPRIds.length>0&&(
            <div className="summary-stat">
              <span style={{color:"var(--text2)"}}>Neue PRs</span>
              <span style={{fontFamily:"var(--head)",fontWeight:700,color:"var(--gld)"}}>🏆 {session.newPRIds.length}</span>
            </div>
          )}
          {topSet.name&&(
            <div className="summary-stat">
              <span style={{color:"var(--text2)"}}>Top Übung</span>
              <span style={{fontFamily:"var(--head)",fontWeight:600,color:"var(--grn)",fontSize:13}}>{topSet.name}</span>
            </div>
          )}
        </div>

        <button className="btn" onClick={onClose}>Weiter</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════  TRAINING LOG  */
function LogTab({ sessions, setSessions, prs, setPrs, userProfile, customExercises }) {
  const [view,     setView]      = useState("list");
  const [expanded, setExp]       = useState(null);
  const [sDate,    setDate]      = useState(todayISO());
  const [sNote,    setNote]      = useState("");
  const [entries,  setEnt]       = useState([{exId:ALL_EX[0].id,sets:[{weight:"",reps:""}]}]);
  const [celebPRs, setCelebPRs]  = useState(null);
  const [summary,  setSummary]   = useState(null);

  const allExercises = useMemo(()=>[
    ...ALL_EX,
    ...(customExercises||[]).map(ce=>({...ce,muscle:ce.muscle||"Custom",isCustom:true})),
  ],[customExercises]);

  const addEntry   = ()   => setEnt(p=>[...p,{exId:ALL_EX[0].id,sets:[{weight:"",reps:""}]}]);
  const rmEntry    = i    => setEnt(p=>p.filter((_,j)=>j!==i));
  const setEx      = (i,v)=> setEnt(p=>p.map((e,j)=>j===i?{...e,exId:v}:e));
  const addSet     = i    => setEnt(p=>p.map((e,j)=>j===i?{...e,sets:[...e.sets,{weight:e.sets[e.sets.length-1]?.weight||"",reps:""}]}:e));
  const rmSet      = (i,s)=> setEnt(p=>p.map((e,j)=>j===i?{...e,sets:e.sets.filter((_,k)=>k!==s)}:e));
  const updSet     = (i,s,f,v)=> setEnt(p=>p.map((e,j)=>j===i?{...e,sets:e.sets.map((st,k)=>k===s?{...st,[f]:v}:st)}:e));

  const isSetPR = (exId,weight,reps) => {
    const ex=allExercises.find(x=>x.id===exId);
    if (!ex||!reps||ex.isCustom) return false;
    const existingPR=prs[exId];
    const newScore=ex.isReps?calcRepsScore(reps,ex.s):calcScore(weight,reps,ex.s);
    const oldScore=existingPR?getExScore(ex,existingPR):0;
    return newScore>oldScore;
  };

  // Get last logged weight/reps for an exercise
  const getLastLogged = (exId) => {
    for (const s of sessions) {
      const entry = s.exercises.find(e=>e.exId===exId||e.name===allExercises.find(x=>x.id===exId)?.name);
      if (entry) {
        const best = entry.sets.reduce((b,st)=>(!b||Number(st.weight)>Number(b.weight))?st:b, null);
        return best ? `${best.weight>0?best.weight+" kg × ":""}${best.reps} Wdh. (${fmtShort(s.date)})` : null;
      }
    }
    return null;
  };

  const save = () => {
    const clean=entries.map(en=>{
      const ex=allExercises.find(x=>x.id===en.exId);
      const sets=en.sets.filter(s=>s.reps).map(s=>({weight:Number(s.weight)||0,reps:Number(s.reps)}));
      return sets.length?{exId:en.exId,name:ex.name,muscle:ex.muscle,sets}:null;
    }).filter(Boolean);
    if (!clean.length) return;

    const newPRsList=[];
    const updatedPRs={...prs};
    for (const entry of clean) {
      const ex=allExercises.find(x=>x.id===entry.exId);
      if (!ex||ex.isCustom) continue;
      let bestW=0,bestR=0,bestVal=-1;
      for (const set of entry.sets) {
        const w=set.weight,r=set.reps;
        const val=ex.isReps?r:epley1RM(w,r);
        if (val>bestVal){bestVal=val;bestW=w;bestR=r;}
      }
      if (!bestR) continue;
      const newScore=ex.isReps?calcRepsScore(bestR,ex.s):calcScore(bestW,bestR,ex.s);
      const existingPR=updatedPRs[ex.id];
      const oldScore=existingPR?getExScore(ex,existingPR):0;
      if (newScore>oldScore) {
        updatedPRs[ex.id]={weight:bestW,reps:bestR,date:sDate};
        newPRsList.push({id:ex.id,name:ex.name,muscle:ex.muscle,isReps:!!ex.isReps,weight:bestW,reps:bestR,newScore,oldScore});
      }
    }
    if (newPRsList.length>0) setPrs(updatedPRs);

    const totalVol =clean.reduce((s,e)=>s+e.sets.reduce((ss,st)=>ss+st.weight*st.reps,0),0);
    const totalSets=clean.reduce((s,e)=>s+e.sets.length,0);
    const prExIds=new Set(newPRsList.map(p=>p.id));
    const newSession = {
      id:Date.now(),date:sDate,note:sNote,exercises:clean,
      totalVol,totalSets,newPRIds:[...prExIds],
    };
    setSessions(prev=>[newSession,...prev]);
    setDate(todayISO());setNote("");
    setEnt([{exId:ALL_EX[0].id,sets:[{weight:"",reps:""}]}]);
    setView("list");
    if (newPRsList.length>0) setCelebPRs(newPRsList);
    else setSummary(newSession);
  };

  if (view==="add") return (
    <div className="scroll fi">
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
        <button className="btn-g" onClick={()=>setView("list")}>← Zurück</button>
        <div className="h2">Neue Einheit</div>
      </div>
      <div className="fr2" style={{marginBottom:12}}>
        <div className="fg"><label className="flbl">Datum</label><input className="finp" type="date" value={sDate} onChange={e=>setDate(e.target.value)} /></div>
        <div className="fg"><label className="flbl">Bezeichnung (optional)</label><input className="finp" value={sNote} onChange={e=>setNote(e.target.value)} placeholder="z.B. Push Day" /></div>
      </div>
      <Lbl>Übungen</Lbl>
      {entries.map((entry,ei)=>{
        const ex=allExercises.find(x=>x.id===entry.exId);
        const liveSetPRFlags=entry.sets.map(set=>{
          const w=Number(set.weight)||0,r=Number(set.reps)||0;
          return r>0&&isSetPR(entry.exId,w,r);
        });
        const anyLivePR=liveSetPRFlags.some(Boolean);
        const lastLogged=getLastLogged(entry.exId);

        return (
          <div key={ei} style={{background:"var(--bg)",borderRadius:8,padding:12,marginBottom:8,border:anyLivePR?"1px solid rgba(251,191,36,0.5)":"1px solid var(--bdr)",transition:"border-color .3s"}}>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
              <select className="fsel" style={{flex:1}} value={entry.exId} onChange={e=>setEx(ei,e.target.value)}>
                {[...MUSCLES,"Custom"].map(m=>{
                  const grpEx=[...ALL_EX.filter(x=>x.muscle===m),(customExercises||[]).filter(x=>!x.muscle||x.muscle===m).map(x=>({...x,muscle:m}))].flat();
                  if(!grpEx.length)return null;
                  return (
                    <optgroup key={m} label={m}>
                      {grpEx.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
                    </optgroup>
                  );
                })}
              </select>
              <button className="btn-i" onClick={()=>rmEntry(ei)}>✕</button>
            </div>

            {/* Exercise hint */}
            {ex&&!ex.isCustom&&<div style={{fontSize:12,color:"var(--text2)",marginBottom:6,paddingLeft:2}}>ℹ {ex.note}</div>}

            {/* Last logged */}
            {lastLogged&&(
              <div style={{fontSize:12,color:"var(--acc)",marginBottom:8,paddingLeft:2}}>
                📌 Zuletzt: {lastLogged}
              </div>
            )}

            {/* Live PR banner */}
            {anyLivePR&&(
              <div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(251,191,36,0.1)",border:"1px solid rgba(251,191,36,0.35)",borderRadius:7,padding:"8px 12px",marginBottom:10,animation:"fadeUp .25s ease"}}>
                <span style={{fontSize:20}}>🏆</span>
                <div>
                  <div style={{fontFamily:"var(--head)",fontSize:14,fontWeight:700,color:"var(--gld)"}}>Neuer Persönlicher Rekord!</div>
                  <div style={{fontSize:12,color:"var(--text2)"}}>Dieser Satz schlägt deinen bisherigen Bestwert – wird automatisch gespeichert.</div>
                </div>
              </div>
            )}

            {/* Sets */}
            {entry.sets.map((set,si)=>{
              const w=Number(set.weight)||0,r=Number(set.reps)||0;
              const isPR=r>0&&isSetPR(entry.exId,w,r);
              return (
                <div key={si} style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
                  <div style={{fontSize:12,width:18,textAlign:"center",flexShrink:0,color:isPR?"var(--gld)":"var(--muted)",fontWeight:isPR?700:400}}>
                    {isPR?"★":si+1}
                  </div>
                  {!ex?.isReps&&(
                    <input className="finp" type="number" inputMode="decimal" value={set.weight} onChange={e=>updSet(ei,si,"weight",e.target.value)} placeholder="kg" style={{flex:1,borderColor:isPR?"rgba(251,191,36,0.5)":undefined}} />
                  )}
                  <input className="finp" type="number" inputMode="numeric" value={set.reps} onChange={e=>updSet(ei,si,"reps",e.target.value)} placeholder="Wdh." style={{flex:1,borderColor:isPR?"rgba(251,191,36,0.5)":undefined}} />
                  <button className="btn-i" onClick={()=>rmSet(ei,si)} style={{flexShrink:0}}>−</button>
                </div>
              );
            })}
            <button className="btn-add" style={{width:"100%",marginTop:4}} onClick={()=>addSet(ei)}>+ Satz</button>
          </div>
        );
      })}
      <button className="btn-g" style={{width:"100%",marginBottom:10,marginTop:4}} onClick={addEntry}>+ Übung hinzufügen</button>
      <button className="btn" onClick={save}>Einheit speichern</button>
    </div>
  );

  return (
    <>
      {celebPRs&&<PRModal newPRs={celebPRs} onClose={()=>{setCelebPRs(null);setSummary(sessions[0]);}} />}
      {summary&&!celebPRs&&<SessionSummary session={summary} onClose={()=>setSummary(null)} userProfile={userProfile} />}

      <div className="scroll fi">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <div className="h2">Trainingslog</div>
          <button className="btn" style={{width:"auto",padding:"9px 18px",fontSize:13}} onClick={()=>setView("add")}>+ Neue Einheit</button>
        </div>

        {sessions.length===0?(
          <div className="empty"><span className="empty-i">📋</span>Noch keine Einheiten.<br />Tippe auf <strong style={{color:"var(--acc)"}}>Neue Einheit</strong> um zu starten.</div>
        ):sessions.map(s=>{
          const hasPRs=s.newPRIds&&s.newPRIds.length>0;
          const cals=estimateCalories(s,userProfile?.weight||80);
          return (
            <div key={s.id} className="sess" style={{borderColor:hasPRs?"rgba(251,191,36,0.3)":undefined}}>
              <div className="sess-h" onClick={()=>setExp(expanded===s.id?null:s.id)}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{fontFamily:"var(--head)",fontSize:17,fontWeight:700,color:"#fff"}}>{s.note||"Workout"}</div>
                    {hasPRs&&<div style={{fontFamily:"var(--head)",fontSize:11,fontWeight:700,color:"var(--gld)",background:"rgba(251,191,36,0.12)",border:"1px solid rgba(251,191,36,0.35)",borderRadius:20,padding:"2px 8px",letterSpacing:"0.5px"}}>🏆 {s.newPRIds.length} PR{s.newPRIds.length>1?"s":""}</div>}
                  </div>
                  <div style={{fontSize:12,color:"var(--muted)",marginTop:2}}>
                    {fmtDate(s.date)} · {s.exercises.length} Übungen · {s.totalSets} Sätze · 🔥{cals} kcal
                  </div>
                </div>
                <div style={{textAlign:"right",marginLeft:8}}>
                  <div style={{fontFamily:"var(--head)",fontSize:16,fontWeight:700,color:"var(--acc)"}}>{s.totalVol>=1000?(s.totalVol/1000).toFixed(1)+"t":s.totalVol+" kg"}</div>
                  <div style={{fontSize:11,color:"var(--muted)"}}>Volumen</div>
                </div>
              </div>

              {expanded===s.id&&(
                <div className="sess-b">
                  {s.exercises.map((e,i)=>{
                    const isPREx=s.newPRIds&&s.newPRIds.includes(e.exId);
                    return (
                      <div key={i} className="sess-row" style={{borderColor:isPREx?"rgba(251,191,36,0.2)":undefined}}>
                        <div>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <div style={{fontWeight:600}}>{e.name}</div>
                            {isPREx&&<span style={{fontSize:13}}>🏆</span>}
                          </div>
                          <div style={{fontSize:12,color:"var(--muted)"}}>{e.muscle}</div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          {e.sets.map((st,si)=>(
                            <div key={si} style={{fontSize:13}}>{st.weight>0?`${st.weight} kg × ${st.reps}`:`${st.reps} Wdh.`}</div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                  <button className="btn-d" style={{marginTop:10}} onClick={()=>setSessions(p=>p.filter(x=>x.id!==s.id))}>Löschen</button>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </>
  );
}

/* ═══════════════════════════════════════════════════════════  STATS TAB  */
function StatsTab({ sessions, prs, userProfile, bodyWeightLog }) {
  const hasSessions=sessions.length>0, hasPRs=Object.keys(prs).length>0;

  const stats=useMemo(()=>{
    if (!hasSessions) return null;
    const sorted=[...sessions].sort((a,b)=>a.date.localeCompare(b.date));
    const total=sessions.length;
    const totalVol=sessions.reduce((s,x)=>s+x.totalVol,0);
    const totalSets=sessions.reduce((s,x)=>s+x.totalSets,0);
    const avgVol=Math.round(totalVol/total);
    const totalCals=sessions.reduce((s,x)=>s+estimateCalories(x,userProfile?.weight||80),0);

    const dateSet=new Set(sessions.map(s=>s.date));
    let streak=0;
    for(let i=0;i<365;i++){const d=new Date();d.setDate(d.getDate()-i);const iso=d.toISOString().slice(0,10);if(dateSet.has(iso))streak++;else if(i>0)break;}
    const allDates=[...dateSet].sort();
    let bestStreak=0,cur=0;
    for(let i=0;i<allDates.length;i++){if(i===0){cur=1;continue;}const prev=new Date(allDates[i-1]+"T00:00:00"),this_=new Date(allDates[i]+"T00:00:00"),diff=(this_-prev)/86400000;if(diff===1)cur++;else cur=1;if(cur>bestStreak)bestStreak=cur;}
    bestStreak=Math.max(bestStreak,streak);

    const months=[];
    for(let i=5;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);const key=d.toISOString().slice(0,7),lbl=d.toLocaleDateString("de-AT",{month:"short"});months.push({key,lbl,count:sessions.filter(s=>s.date.startsWith(key)).length});}

    const daysSince=Math.max(1,Math.ceil((new Date()-new Date(sorted[0].date+"T00:00:00"))/86400000));
    const avgPerWeek=(total/Math.max(1,daysSince/7)).toFixed(1);
    const consistency=Math.min(100,Math.round((total/daysSince)*7*25));
    const volByMonth=months.map(m=>({...m,vol:sessions.filter(s=>s.date.startsWith(m.key)).reduce((s,x)=>s+x.totalVol,0)}));

    const muscleVol={};
    sessions.forEach(s=>s.exercises.forEach(e=>{const vol=e.sets.reduce((s,st)=>s+st.weight*st.reps,0);muscleVol[e.muscle]=(muscleVol[e.muscle]||0)+vol;}));
    const topMuscles=Object.entries(muscleVol).sort((a,b)=>b[1]-a[1]);

    const exFreq={};
    sessions.forEach(s=>s.exercises.forEach(e=>{exFreq[e.name]=(exFreq[e.name]||0)+1;}));
    const topEx=Object.entries(exFreq).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const prByMuscle=MUSCLES.reduce((acc,m)=>({...acc,[m]:EX[m].filter(e=>prs[e.id]).length}),{});

    return {total,totalVol,totalSets,avgVol,streak,bestStreak,months,avgPerWeek,consistency,volByMonth,topMuscles,topEx,prByMuscle,daysSince,totalCals};
  },[sessions,prs,userProfile]);

  const muscleBalance=useMemo(()=>MUSCLES.map(m=>({muscle:m,score:getMuscleScore(m,prs),prCount:EX[m].filter(e=>prs[e.id]).length,total:EX[m].length})),[prs]);
  const overallScore=useMemo(()=>{const f=muscleBalance.filter(m=>m.score>0);return f.length?Math.round(f.reduce((s,m)=>s+m.score,0)/f.length):0;},[muscleBalance]);
  const topPRs=useMemo(()=>ALL_EX.filter(e=>prs[e.id]).map(e=>{const pr=prs[e.id],score=getExScore(e,pr);return {...e,pr,score};}).sort((a,b)=>b.score-a.score).slice(0,6),[prs]);
  const COLORS=["var(--acc)","var(--grn)","var(--gld)","#a855f7","var(--red)","#f97316"];

  if (!hasSessions&&!hasPRs) return (
    <div className="scroll fi"><div className="empty"><span className="empty-i">📊</span>Noch keine Daten.<br />Logge Einheiten und setze PRs um Statistiken zu sehen.</div></div>
  );

  return (
    <div className="scroll fi">
      {overallScore>0&&(
        <div className="card" style={{marginBottom:14,background:`linear-gradient(135deg,${getRank(overallScore).bg},rgba(0,0,0,0))`,borderColor:getRank(overallScore).color+"30",textAlign:"center"}}>
          <div style={{fontFamily:"var(--head)",fontSize:13,letterSpacing:2,color:"var(--muted)",marginBottom:4}}>GESAMTRANG</div>
          <div style={{fontFamily:"var(--head)",fontSize:48,fontWeight:800,color:getRank(overallScore).color,lineHeight:1}}>{overallScore}</div>
          <div style={{fontFamily:"var(--head)",fontSize:18,fontWeight:700,color:getRank(overallScore).color,marginBottom:8}}>{getRank(overallScore).name}</div>
          <div style={{display:"flex",justifyContent:"center",gap:8}}>
            <div className="top-pct" style={{background:`${getRank(overallScore).color}18`,border:`1px solid ${getRank(overallScore).color}44`,color:getRank(overallScore).color}}>Top {scoreToTopPct(overallScore)}% weltweit</div>
          </div>
        </div>
      )}

      {stats&&(
        <>
          <div className="streak">
            <div className="streak-n">{stats.streak}</div>
            <div>
              <div style={{fontFamily:"var(--head)",fontSize:20,fontWeight:700,color:"#fff",marginBottom:2}}>Tage Streak 🔥</div>
              <div style={{fontSize:14,color:"var(--text2)"}}>Bester: {stats.bestStreak} Tage</div>
            </div>
          </div>

          <div className="sg3">
            <div className="sbox"><div className="sval">{stats.total}</div><div className="slbl">Einheiten</div></div>
            <div className="sbox"><div className="sval">{stats.avgPerWeek}</div><div className="slbl">Pro Woche</div></div>
            <div className="sbox"><div className="sval">{Object.keys(prs).length}</div><div className="slbl">PRs gesetzt</div></div>
          </div>

          <div className="sg2">
            <div className="sbox">
              <div className="sval" style={{fontSize:22}}>{stats.totalVol>=1000?(stats.totalVol/1000).toFixed(1):stats.totalVol}<span className="sunit">{stats.totalVol>=1000?"t":"kg"}</span></div>
              <div className="slbl">Gesamtvolumen</div>
            </div>
            <div className="sbox" style={{borderColor:"rgba(244,63,94,.2)"}}>
              <div className="sval" style={{fontSize:22}}>{stats.totalCals>=1000?(stats.totalCals/1000).toFixed(1):stats.totalCals}<span className="sunit">{stats.totalCals>=1000?"Mkcal":"kcal"}</span></div>
              <div className="slbl">Kcal verbrannt ca.</div>
            </div>
          </div>

          <Lbl>Einheiten pro Monat</Lbl>
          <div className="card">
            <div className="vchart" style={{height:90}}>
              {stats.months.map(m=>{
                const max=Math.max(...stats.months.map(x=>x.count),1);
                return (
                  <div key={m.key} className="vbw">
                    <div className="vb" style={{height:`${(m.count/max)*74}px`,background:m.count>0?"linear-gradient(180deg,var(--acc),rgba(56,189,248,.3))":"var(--bdr)"}} />
                    <div className="vl">{m.lbl}</div>
                  </div>
                );
              })}
            </div>
          </div>

          <Lbl>Monatliches Volumen (kg)</Lbl>
          <div className="card">
            <div className="vchart" style={{height:90}}>
              {stats.volByMonth.map(m=>{
                const max=Math.max(...stats.volByMonth.map(x=>x.vol),1);
                return (
                  <div key={m.key} className="vbw">
                    <div className="vb" style={{height:`${(m.vol/max)*74}px`,background:m.vol>0?"linear-gradient(180deg,var(--grn),rgba(52,211,153,.3))":"var(--bdr)"}} />
                    <div className="vl">{m.lbl}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {stats.topMuscles.length>0&&(
            <>
              <Lbl>Volumen nach Muskelgruppe</Lbl>
              <div className="clist">
                {stats.topMuscles.map(([muscle,vol],i)=>{
                  const max=stats.topMuscles[0][1],c=COLORS[i]||"var(--muted)";
                  return (
                    <div key={muscle} className="row">
                      <div style={{width:20,textAlign:"center",fontFamily:"var(--head)",fontWeight:700,color:"var(--muted)",fontSize:13}}>{i+1}</div>
                      <div style={{flex:1,marginLeft:10}}>
                        <div style={{fontWeight:600,marginBottom:4}}>{muscle}</div>
                        <div style={{height:4,background:"var(--bdr)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${(vol/max)*100}%`,background:c,borderRadius:2}} /></div>
                      </div>
                      <div style={{fontFamily:"var(--head)",fontWeight:700,fontSize:15,color:c,marginLeft:10}}>{vol>=1000?(vol/1000).toFixed(1)+"t":vol+" kg"}</div>
                    </div>
                  );
                })}
              </div>
            </>
          )}

          {stats.topEx.length>0&&(
            <>
              <Lbl>Meisttrainierte Übungen</Lbl>
              <div className="clist">
                {stats.topEx.map(([name,count],i)=>(
                  <div key={name} className="row">
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:20,textAlign:"center",fontFamily:"var(--head)",fontWeight:700,color:"var(--muted)",fontSize:13}}>{i+1}</div>
                      <div style={{fontWeight:600}}>{name}</div>
                    </div>
                    <div style={{fontFamily:"var(--head)",fontWeight:700,fontSize:14,color:"var(--acc)"}}>{count}× eingetragen</div>
                  </div>
                ))}
              </div>
            </>
          )}
        </>
      )}

      {/* Körpergewicht Liniendiagramm */}
      {bodyWeightLog&&bodyWeightLog.length>=2&&(
        <>
          <Lbl>Körpergewicht Verlauf</Lbl>
          <div className="card">
            {(()=>{
              const sorted=[...bodyWeightLog].sort((a,b)=>a.date.localeCompare(b.date)).slice(-20);
              const min=Math.min(...sorted.map(x=>x.weight))-2;
              const max=Math.max(...sorted.map(x=>x.weight))+2;
              const range=max-min||1;
              const w=100/sorted.length;
              return (
                <div>
                  <svg viewBox={`0 0 100 50`} style={{width:"100%",height:80,overflow:"visible"}}>
                    <polyline
                      fill="none"
                      stroke="var(--acc)"
                      strokeWidth="1.5"
                      points={sorted.map((p,i)=>`${i*w+w/2},${50-(p.weight-min)/range*44}`).join(" ")}
                    />
                    {sorted.map((p,i)=>(
                      <circle key={i} cx={i*w+w/2} cy={50-(p.weight-min)/range*44} r="2" fill="var(--acc)" />
                    ))}
                  </svg>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--muted)",marginTop:4}}>
                    <span>{fmtShort(sorted[0].date)}</span>
                    <span style={{color:"var(--acc)",fontFamily:"var(--head)",fontWeight:700}}>
                      {sorted[sorted.length-1].weight} kg
                    </span>
                    <span>{fmtShort(sorted[sorted.length-1].date)}</span>
                  </div>
                </div>
              );
            })()}
          </div>
        </>
      )}

      {/* Muscle Balance */}
      <Lbl>Muskelbalance</Lbl>
      <div className="card">
        {muscleBalance.map(({muscle,score,prCount,total})=>{
          const r=getRank(score);
          return (
            <div key={muscle} className="balance-item">
              <div className="balance-label">{muscle}</div>
              <div className="balance-track" style={{flex:1}}><div className="balance-fill" style={{width:`${score}%`,background:r.color,boxShadow:`0 0 4px ${r.color}44`}} /></div>
              <div style={{fontFamily:"var(--head)",fontSize:13,fontWeight:700,color:r.color,minWidth:30,textAlign:"right"}}>{score}</div>
              <div style={{fontSize:11,color:"var(--muted)",minWidth:36,textAlign:"right"}}>{prCount}/{total}</div>
            </div>
          );
        })}
        <div style={{fontSize:12,color:"var(--text2)",marginTop:10,borderTop:"1px solid var(--bdr)",paddingTop:10}}>
          {(()=>{
            const scores=muscleBalance.filter(m=>m.score>0).map(m=>m.score);
            if(scores.length<2) return "Trage mehr PRs für alle Muskelgruppen ein um deine Balance zu sehen.";
            const max=Math.max(...scores),min=Math.min(...scores),diff=max-min;
            if(diff<20) return "✅ Deine Muskelentwicklung ist gut ausgewogen! Weiter so.";
            if(diff<40) return "⚠️ Leichte Imbalance. Konzentriere dich auf schwächere Muskelgruppen.";
            return "🔴 Deutliche Imbalance. Priorisiere unterentwickelte Muskeln um Verletzungen vorzubeugen.";
          })()}
        </div>
      </div>

      {topPRs.length>0&&(
        <>
          <Lbl>Top PRs nach Score</Lbl>
          <div className="clist">
            {topPRs.map((ex,i)=>{
              const r=getRank(ex.score);
              return (
                <div key={ex.id} className="row">
                  <div style={{width:20,textAlign:"center",fontFamily:"var(--head)",fontWeight:700,color:"var(--muted)",fontSize:13}}>{i+1}</div>
                  <div style={{flex:1,marginLeft:10}}>
                    <div style={{fontWeight:600}}>{ex.name}</div>
                    <div style={{fontSize:12,color:"var(--muted)"}}>{ex.muscle} · {fmtDate(ex.pr.date)}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"var(--head)",fontWeight:700,color:r.color,fontSize:16}}>{ex.isReps?ex.pr.reps+" Wdh.":ex.pr.weight+" kg × "+ex.pr.reps}</div>
                    <div style={{display:"flex",gap:6,justifyContent:"flex-end",marginTop:2}}>
                      <Badge score={ex.score} />
                      <span style={{fontSize:11,color:"var(--muted)",alignSelf:"center"}}>Top {scoreToTopPct(ex.score)}%</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════  ACHIEVEMENTS TAB  */
function AchievementsTab({ prs, sessions, customExercises, goals }) {
  const overall=useMemo(()=>{const scores=MUSCLES.map(m=>getMuscleScore(m,prs)).filter(s=>s>0);return scores.length?Math.round(scores.reduce((s,x)=>s+x,0)/scores.length):0;},[prs]);
  const results=useMemo(()=>ACHIEVEMENTS.map(a=>({...a,done:a.check(prs,sessions,overall,customExercises,goals)})),[prs,sessions,overall,customExercises,goals]);
  const doneCount=results.filter(a=>a.done).length;
  const pct=Math.round((doneCount/ACHIEVEMENTS.length)*100);
  const fact=useMemo(()=>FUN_FACTS[Math.floor(Date.now()/86400000)%FUN_FACTS.length],[]);

  return (
    <div className="scroll fi">
      <div className="card" style={{marginBottom:14,background:"linear-gradient(135deg,rgba(251,191,36,.08),rgba(0,0,0,0))",borderColor:"rgba(251,191,36,.25)",textAlign:"center"}}>
        <div style={{fontFamily:"var(--head)",fontSize:40,lineHeight:1,marginBottom:8}}>🏆</div>
        <div className="h2" style={{marginBottom:4}}>Achievements</div>
        <div style={{fontSize:14,color:"var(--text2)",marginBottom:12}}>{doneCount} von {ACHIEVEMENTS.length} freigeschaltet</div>
        <div className="bar-t" style={{height:8}}><div className="bar-f" style={{width:`${pct}%`,background:"var(--gld)",boxShadow:"0 0 8px rgba(251,191,36,.5)"}} /></div>
        <div style={{fontSize:12,color:"var(--muted)",marginTop:6}}>{pct}% abgeschlossen</div>
      </div>

      {results.filter(a=>a.done).length>0&&(
        <>
          <Lbl>Freigeschaltet ({doneCount})</Lbl>
          {results.filter(a=>a.done).map(a=>(
            <div key={a.id} className="ach done">
              <div className="ach-icon">{a.icon}</div>
              <div style={{flex:1}}><div className="ach-title">{a.title}</div><div className="ach-desc">{a.desc}</div></div>
              <div className="ach-done-badge">✓ DONE</div>
            </div>
          ))}
        </>
      )}

      {results.filter(a=>!a.done).length>0&&(
        <>
          <Lbl>Gesperrt ({ACHIEVEMENTS.length-doneCount})</Lbl>
          {results.filter(a=>!a.done).map(a=>(
            <div key={a.id} className="ach locked">
              <div className="ach-icon">🔒</div>
              <div style={{flex:1}}><div className="ach-title">{a.title}</div><div className="ach-desc">{a.desc}</div></div>
            </div>
          ))}
        </>
      )}

      <Lbl>Wusstest du?</Lbl>
      <div className="fact" style={{marginBottom:0}}>
        <span className="fact-i">{fact.icon}</span>
        <span className="fact-t">{fact.text}</span>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════  PROFILE TAB  */
function ProfileTab({ userProfile, setUserProfile, goals, setGoals, bodyWeightLog, setBodyWeightLog, prs }) {
  const [weightInput, setWeightInput] = useState(userProfile?.weight?String(userProfile.weight):"");
  const [heightInput, setHeightInput] = useState(userProfile?.height?String(userProfile.height):"");
  const [goalInput,   setGoalInput]   = useState(userProfile?.trainingGoal||"hypertrophy");
  const [targetReps,  setTargetReps]  = useState(userProfile?.targetReps?String(userProfile.targetReps):"8");
  const [targetSets,  setTargetSets]  = useState(userProfile?.targetSets?String(userProfile.targetSets):"4");
  const [saved,       setSaved]       = useState(false);

  // Dream goal form
  const [gExId,  setGExId]  = useState(ALL_EX[0].id);
  const [gTarget,setGTarget]= useState("");
  const [gDate,  setGDate]  = useState("");
  const [showAddGoal, setShowAddGoal] = useState(false);

  // Body weight log
  const [bwInput, setBwInput] = useState("");

  const saveProfile = () => {
    const p={
      weight:Number(weightInput)||0,
      height:Number(heightInput)||0,
      trainingGoal:goalInput,
      targetReps:Number(targetReps)||8,
      targetSets:Number(targetSets)||4,
    };
    setUserProfile(p);
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  };

  const addGoal = () => {
    if (!gTarget||!gDate) return;
    const ex=ALL_EX.find(x=>x.id===gExId);
    if (!ex) return;
    const newGoal={
      id:Date.now(),
      exId:gExId,
      exName:ex.name,
      isReps:!!ex.isReps,
      targetWeight:Number(gTarget)||0,
      targetReps:Number(gTarget)||0,
      targetDate:gDate,
    };
    setGoals(prev=>[...prev,newGoal]);
    setGTarget("");setGDate("");setShowAddGoal(false);
  };

  const removeGoal = id => setGoals(prev=>prev.filter(g=>g.id!==id));

  const addBodyWeight = () => {
    const w=Number(bwInput);
    if (!w||w<20||w>300) return;
    setBodyWeightLog(prev=>{
      const today=todayISO();
      const filtered=prev.filter(x=>x.date!==today);
      return [...filtered,{date:today,weight:w}].sort((a,b)=>a.date.localeCompare(b.date));
    });
    setBwInput("");
  };

  // Goal progress calculator
  const calcGoalProgress = (goal) => {
    const ex=ALL_EX.find(x=>x.id===goal.exId);
    if (!ex) return null;
    const pr=prs[goal.exId];
    const currentVal = pr?(ex.isReps?pr.reps:epley1RM(pr.weight,pr.reps)):0;
    const targetVal  = goal.isReps?goal.targetReps:goal.targetWeight;
    if (!targetVal) return null;
    const pct=Math.min(100,Math.round((currentVal/targetVal)*100));
    const daysLeft=Math.ceil((new Date(goal.targetDate)-new Date())/86400000);

    // Rate of improvement estimate
    const hist = Object.entries(prs).filter(([id])=>id===goal.exId);
    // Simple: if we know current and we have progress, extrapolate
    // Days until goal at current rate
    let eta = null;
    if (pct>0&&pct<100) {
      const needed = targetVal-currentVal;
      // We estimate ~1-2% improvement per week as default
      const weeklyGain = currentVal*0.015;
      const weeksNeeded = Math.ceil(needed/weeklyGain);
      const etaDate = new Date();
      etaDate.setDate(etaDate.getDate()+weeksNeeded*7);
      eta = etaDate.toISOString().slice(0,10);
    }

    return {pct, currentVal:Math.round(currentVal), targetVal, daysLeft, eta, onTrack: eta?new Date(eta)<=new Date(goal.targetDate):false};
  };

  const GOAL_LABELS = {
    strength:     "Maximalkraft",
    hypertrophy:  "Muskelaufbau",
    endurance:    "Ausdauer",
    weight_loss:  "Abnehmen",
    maintenance:  "Halten",
  };

  const getGoalTip = (goal) => {
    const tips = {
      strength: { reps:"1–5 Wiederholungen", sets:"3–5 Sätze", rest:"3–5 Min. Pause", intensity:"85–100% 1RM" },
      hypertrophy: { reps:"6–12 Wiederholungen", sets:"3–5 Sätze", rest:"60–90 Sek. Pause", intensity:"65–85% 1RM" },
      endurance: { reps:"12–20+ Wiederholungen", sets:"2–4 Sätze", rest:"30–60 Sek. Pause", intensity:"50–65% 1RM" },
      weight_loss: { reps:"12–15 Wiederholungen", sets:"3–4 Sätze", rest:"30–60 Sek. Pause", intensity:"Superset-Training empfohlen" },
      maintenance: { reps:"8–12 Wiederholungen", sets:"2–3 Sätze", rest:"60–90 Sek. Pause", intensity:"Moderate Intensität" },
    };
    return tips[goal]||tips.hypertrophy;
  };

  const tip = getGoalTip(goalInput);
  const bmi = userProfile?.weight&&userProfile?.height ? (userProfile.weight/((userProfile.height/100)**2)).toFixed(1) : null;

  return (
    <div className="scroll fi">
      <div className="card" style={{marginBottom:14,background:"linear-gradient(135deg,rgba(168,85,247,.08),rgba(0,0,0,0))",borderColor:"rgba(168,85,247,.25)"}}>
        <div className="h2" style={{marginBottom:4}}>👤 Profil</div>
        <div style={{fontSize:14,color:"var(--text2)"}}>Deine Körperdaten für genauere Berechnungen.</div>
      </div>

      {/* Body stats */}
      <Lbl>Körperdaten</Lbl>
      <div className="card">
        <div className="fr2" style={{marginBottom:12}}>
          <div className="fg">
            <label className="flbl">Körpergewicht (kg)</label>
            <input className="finp" type="number" inputMode="decimal" value={weightInput} onChange={e=>setWeightInput(e.target.value)} placeholder="z.B. 80" />
          </div>
          <div className="fg">
            <label className="flbl">Größe (cm)</label>
            <input className="finp" type="number" inputMode="numeric" value={heightInput} onChange={e=>setHeightInput(e.target.value)} placeholder="z.B. 180" />
          </div>
        </div>

        {bmi&&(
          <div style={{fontSize:13,color:"var(--text2)",marginBottom:12,background:"var(--bg2)",borderRadius:8,padding:"8px 12px"}}>
            BMI: <strong style={{color:"var(--acc)"}}>{bmi}</strong>
            {" · "}
            {Number(bmi)<18.5?"Untergewicht":Number(bmi)<25?"Normalgewicht":Number(bmi)<30?"Übergewicht":"Adipositas"}
          </div>
        )}

        <div className="fg">
          <label className="flbl">Trainingsziel</label>
          <select className="fsel" value={goalInput} onChange={e=>setGoalInput(e.target.value)}>
            <option value="strength">💪 Maximalkraft</option>
            <option value="hypertrophy">📈 Muskelaufbau</option>
            <option value="endurance">🏃 Ausdauer</option>
            <option value="weight_loss">🔥 Abnehmen</option>
            <option value="maintenance">⚖️ Halten</option>
          </select>
        </div>

        <div className="fr2" style={{marginBottom:12}}>
          <div className="fg">
            <label className="flbl">Ziel-Wdh. (Hypertrophie)</label>
            <input className="finp" type="number" inputMode="numeric" value={targetReps} onChange={e=>setTargetReps(e.target.value)} placeholder="8" />
          </div>
          <div className="fg">
            <label className="flbl">Ziel-Sätze</label>
            <input className="finp" type="number" inputMode="numeric" value={targetSets} onChange={e=>setTargetSets(e.target.value)} placeholder="4" />
          </div>
        </div>

        <button className="btn" onClick={saveProfile} style={{background:saved?"var(--grn)":"var(--acc)"}}>
          {saved?"✓ Gespeichert!":"Profil speichern"}
        </button>
      </div>

      {/* Training goal tips */}
      {goalInput&&(
        <>
          <Lbl>Empfehlungen für {GOAL_LABELS[goalInput]}</Lbl>
          <div className="card" style={{borderColor:"rgba(56,189,248,.2)"}}>
            <div style={{fontSize:12,color:"var(--muted)",marginBottom:10}}>💡 Unverbindliche Hinweise – trainiere so wie es für dich passt.</div>
            {Object.entries(tip).map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid var(--bdr)",fontSize:14}}>
                <span style={{color:"var(--text2)",textTransform:"capitalize"}}>{k==="reps"?"Wdh.":k==="sets"?"Sätze":k==="rest"?"Pause":"Intensität"}</span>
                <span style={{color:"var(--acc)",fontWeight:600}}>{v}</span>
              </div>
            ))}
          </div>
        </>
      )}

      {/* Body weight log */}
      <Lbl>Gewichtslog</Lbl>
      <div className="card">
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input className="finp" type="number" inputMode="decimal" value={bwInput} onChange={e=>setBwInput(e.target.value)} placeholder="Heutiges Gewicht (kg)" style={{flex:1}} />
          <button className="btn-add" onClick={addBodyWeight}>Eintragen</button>
        </div>
        {bodyWeightLog.length>0?(
          <div style={{maxHeight:200,overflowY:"auto"}}>
            {[...bodyWeightLog].reverse().slice(0,15).map((entry,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid var(--bdr)",fontSize:13}}>
                <span style={{color:"var(--text2)"}}>{fmtDate(entry.date)}</span>
                <span style={{color:"var(--acc)",fontFamily:"var(--head)",fontWeight:700}}>{entry.weight} kg</span>
              </div>
            ))}
          </div>
        ):(
          <div style={{fontSize:13,color:"var(--muted)",textAlign:"center",padding:"10px 0"}}>Noch keine Gewichtseinträge.</div>
        )}
      </div>

      {/* Dream goals */}
      <Lbl>Traumziele 🎯</Lbl>

      {goals.map(goal=>{
        const progress=calcGoalProgress(goal);
        const ex=ALL_EX.find(x=>x.id===goal.exId);
        const daysLeft=Math.ceil((new Date(goal.targetDate)-new Date())/86400000);
        return (
          <div key={goal.id} className="goal-card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div>
                <div style={{fontWeight:700,fontSize:16,color:"#fff"}}>{goal.exName}</div>
                <div style={{fontSize:13,color:"var(--text2)",marginTop:2}}>
                  Ziel: <strong style={{color:"var(--gld)"}}>{goal.isReps?goal.targetReps+" Wdh.":goal.targetWeight+" kg"}</strong>
                  {" bis "}{fmtDate(goal.targetDate)}
                </div>
              </div>
              <button className="btn-d" style={{padding:"4px 8px",fontSize:11}} onClick={()=>removeGoal(goal.id)}>✕</button>
            </div>

            {progress&&(
              <>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--muted)",marginBottom:4}}>
                  <span>Aktuell: {progress.currentVal}{goal.isReps?" Wdh.":" kg est. 1RM"}</span>
                  <span style={{color:progress.pct>=100?"var(--grn)":progress.onTrack?"var(--acc)":"var(--gld)"}}>{progress.pct}%</span>
                </div>
                <div className="goal-progress">
                  <div className="goal-fill" style={{width:`${progress.pct}%`,background:progress.pct>=100?"var(--grn)":progress.onTrack?"var(--acc)":"var(--gld)"}} />
                </div>
                {progress.pct>=100?(
                  <div className="tip-pill">🏆 Ziel erreicht!</div>
                ):(
                  <div style={{fontSize:12,color:"var(--muted)",marginTop:6}}>
                    {daysLeft>0?(
                      <>
                        {daysLeft} Tage bis Deadline
                        {progress.eta&&(
                          <> · Voraussichtlich {fmtDate(progress.eta)}{" "}
                          <span style={{color:progress.onTrack?"var(--grn)":"var(--gld)"}}>
                            {progress.onTrack?"✓ auf Kurs":"→ danach"}
                          </span></>
                        )}
                      </>
                    ):"⚠️ Deadline überschritten"}
                  </div>
                )}
                {progress.pct<100&&progress.pct>0&&(
                  <div className="tip-pill" style={{marginLeft:0}}>
                    💡 ~1,5% Steigerung/Woche ist realistisch
                  </div>
                )}
              </>
            )}
          </div>
        );
      })}

      {!showAddGoal?(
        <button className="btn-add" style={{width:"100%",marginBottom:10}} onClick={()=>setShowAddGoal(true)}>+ Traumziel hinzufügen</button>
      ):(
        <div className="card" style={{borderColor:"rgba(251,191,36,.25)"}}>
          <div style={{fontFamily:"var(--head)",fontSize:13,letterSpacing:1.5,color:"var(--gld)",marginBottom:12}}>NEUES TRAUMZIEL</div>
          <div className="fg">
            <label className="flbl">Übung</label>
            <select className="fsel" value={gExId} onChange={e=>setGExId(e.target.value)}>
              {MUSCLES.map(m=>(
                <optgroup key={m} label={m}>
                  {EX[m].map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
                </optgroup>
              ))}
            </select>
          </div>
          <div className="fr2" style={{marginBottom:12}}>
            <div className="fg">
              <label className="flbl">{ALL_EX.find(x=>x.id===gExId)?.isReps?"Ziel-Wdh.":"Zielgewicht (kg est.1RM)"}</label>
              <input className="finp" type="number" inputMode="decimal" value={gTarget} onChange={e=>setGTarget(e.target.value)} placeholder="z.B. 100" />
            </div>
            <div className="fg">
              <label className="flbl">Bis Datum</label>
              <input className="finp" type="date" value={gDate} onChange={e=>setGDate(e.target.value)} />
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn" style={{flex:1}} onClick={addGoal}>Ziel setzen</button>
            <button className="btn-g" onClick={()=>setShowAddGoal(false)}>Abbrechen</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════  CUSTOM EXERCISES  */
function CustomExModal({ onAdd, onClose }) {
  const [name,   setName]   = useState("");
  const [muscle, setMuscle] = useState("Chest");
  const [isReps, setIsReps] = useState(false);
  const [note,   setNote]   = useState("");

  const add = () => {
    if (!name.trim()) return;
    const id = "custom_"+Date.now();
    onAdd({ id, name:name.trim(), muscle, isReps, isCustom:true, note, s:{beg:0,nov:0,int:0,adv:0,pro:0,eli:0} });
    onClose();
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(0,0,0,.8)",backdropFilter:"blur(4px)",display:"flex",alignItems:"flex-end",justifyContent:"center",padding:16}}>
      <div style={{background:"var(--surf)",border:"1px solid var(--bdr)",borderRadius:"20px 20px 12px 12px",padding:"24px 20px",width:"100%",maxWidth:480,animation:"popIn .3s ease"}}>
        <div style={{fontFamily:"var(--head)",fontSize:20,fontWeight:800,color:"#fff",marginBottom:16}}>Eigene Übung hinzufügen</div>
        <div className="fg">
          <label className="flbl">Übungsname</label>
          <input className="finp" value={name} onChange={e=>setName(e.target.value)} placeholder="z.B. Kabelzug Außenrotation" />
        </div>
        <div className="fg">
          <label className="flbl">Muskelgruppe</label>
          <select className="fsel" value={muscle} onChange={e=>setMuscle(e.target.value)}>
            {MUSCLES.map(m=><option key={m} value={m}>{m}</option>)}
            <option value="Custom">Sonstige</option>
          </select>
        </div>
        <div className="fg">
          <label className="flbl">Typ</label>
          <select className="fsel" value={isReps?"reps":"weight"} onChange={e=>setIsReps(e.target.value==="reps")}>
            <option value="weight">Gewicht + Wiederholungen</option>
            <option value="reps">Nur Wiederholungen (Körpergewicht)</option>
          </select>
        </div>
        <div className="fg">
          <label className="flbl">Notiz (optional)</label>
          <input className="finp" value={note} onChange={e=>setNote(e.target.value)} placeholder="Ausführungshinweis..." />
        </div>
        <div style={{fontSize:12,color:"var(--muted)",marginBottom:16,background:"var(--bg2)",borderRadius:8,padding:"8px 12px"}}>
          ℹ️ Eigene Übungen können nicht bewertet/gerankt werden, da keine Referenzwerte vorhanden sind.
        </div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn" style={{flex:1}} onClick={add}>Hinzufügen</button>
          <button className="btn-g" onClick={onClose}>Abbrechen</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════  ROOT  */
const TABS = [
  { id:"dashboard",    label:"Home",    icon:"🏠" },
  { id:"prs",          label:"PRs",     icon:"⭐" },
  { id:"log",          label:"Log",     icon:"📋" },
  { id:"stats",        label:"Stats",   icon:"📊" },
  { id:"achievements", label:"Awards",  icon:"🏆" },
  { id:"profile",      label:"Profil",  icon:"👤" },
];

function IronRank() {
  const [tab, setTab] = useState("dashboard");

  const load = (key,fallback) => { try{const v=localStorage.getItem(key);return v?JSON.parse(v):fallback;}catch{return fallback;} };

  const [prs,              setPrsRaw]             = useState(()=>load("ir_prs",{}));
  const [sessions,         setSessionsRaw]         = useState(()=>load("ir_sessions",[]));
  const [prHistory,        setPRHistoryRaw]        = useState(()=>load("ir_prHistory",{}));
  const [userProfile,      setUserProfileRaw]      = useState(()=>load("ir_profile",{}));
  const [goals,            setGoalsRaw]            = useState(()=>load("ir_goals",[]));
  const [bodyWeightLog,    setBodyWeightLogRaw]    = useState(()=>load("ir_bwlog",[]));
  const [customExercises,  setCustomExercisesRaw]  = useState(()=>load("ir_custom_ex",[]));
  const [showAddCustom,    setShowAddCustom]       = useState(false);

  const persist = (key,val) => { try{localStorage.setItem(key,JSON.stringify(val));}catch{} };

  const setPrs          = v => { const n=typeof v==="function"?v(prs):v;          setPrsRaw(n);         persist("ir_prs",n); };
  const setSessions     = v => { const n=typeof v==="function"?v(sessions):v;     setSessionsRaw(n);    persist("ir_sessions",n); };
  const setPRHistory    = v => { const n=typeof v==="function"?v(prHistory):v;    setPRHistoryRaw(n);   persist("ir_prHistory",n); };
  const setUserProfile  = v => { const n=typeof v==="function"?v(userProfile):v;  setUserProfileRaw(n); persist("ir_profile",n); };
  const setGoals        = v => { const n=typeof v==="function"?v(goals):v;        setGoalsRaw(n);       persist("ir_goals",n); };
  const setBodyWeightLog= v => { const n=typeof v==="function"?v(bodyWeightLog):v;setBodyWeightLogRaw(n);persist("ir_bwlog",n); };
  const setCustomExercises=v=>{ const n=typeof v==="function"?v(customExercises):v;setCustomExercisesRaw(n);persist("ir_custom_ex",n); };

  useEffect(()=>{
    setPRHistory(prev=>{
      const next={...prev};
      Object.entries(prs).forEach(([id,pr])=>{
        if(!next[id])next[id]=[];
        const last=next[id][next[id].length-1];
        if(!last||last.weight!==pr.weight||last.reps!==pr.reps){
          next[id]=[...next[id].slice(-9),{...pr}];
        }
      });
      return next;
    });
  },[prs]);

  const prCount  = Object.keys(prs).length;
  const sesCount = sessions.length;
  const overallScore = useMemo(()=>{
    const scores=MUSCLES.map(m=>getMuscleScore(m,prs)).filter(s=>s>0);
    return scores.length?Math.round(scores.reduce((s,x)=>s+x,0)/scores.length):0;
  },[prs]);
  const newAchs = useMemo(()=>ACHIEVEMENTS.filter(a=>a.check(prs,sessions,overallScore,customExercises,goals)).length,[prs,sessions,overallScore,customExercises,goals]);

  return (
    <>
      <style>{CSS}</style>
      <div className="app">
        {/* HEADER */}
        <div className="hdr">
          <div>
            <div className="logo">IRON<em>RANK</em></div>
            <div className="logo-sub">Strength Tracker</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div className="hdr-stats">
              <div><span>{prCount}</span> PRs · <span>{sesCount}</span> Einheiten</div>
              {newAchs>0&&<div style={{color:"var(--gld)"}}>🏆 {newAchs} Achievements</div>}
            </div>
            {/* Custom exercise button */}
            <button title="Eigene Übung" onClick={()=>setShowAddCustom(true)} style={{background:"none",border:"1px solid var(--bdr2)",borderRadius:8,padding:"6px 10px",color:"var(--muted)",fontSize:16,cursor:"pointer",flexShrink:0}}>➕</button>
          </div>
        </div>

        {/* NAV */}
        <div className="nav">
          {TABS.map(t=>(
            <button key={t.id} className={`nav-btn ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}>
              {t.label}
              {t.id==="achievements"&&newAchs>0&&<span style={{marginLeft:3,color:"var(--gld)"}}>•</span>}
            </button>
          ))}
        </div>

        {tab==="dashboard"    && <DashboardTab    prs={prs} sessions={sessions} onNavigate={setTab} userProfile={userProfile} />}
        {tab==="prs"          && <PRsTab          prs={prs} setPrs={setPrs} prHistory={prHistory} customExercises={customExercises} />}
        {tab==="log"          && <LogTab          sessions={sessions} setSessions={setSessions} prs={prs} setPrs={setPrs} userProfile={userProfile} customExercises={customExercises} />}
        {tab==="stats"        && <StatsTab        sessions={sessions} prs={prs} userProfile={userProfile} bodyWeightLog={bodyWeightLog} />}
        {tab==="achievements" && <AchievementsTab prs={prs} sessions={sessions} customExercises={customExercises} goals={goals} />}
        {tab==="profile"      && <ProfileTab      userProfile={userProfile} setUserProfile={setUserProfile} goals={goals} setGoals={setGoals} bodyWeightLog={bodyWeightLog} setBodyWeightLog={setBodyWeightLog} prs={prs} />}

        {showAddCustom&&(
          <CustomExModal
            onAdd={ex=>{setCustomExercises(prev=>[...prev,ex]);setShowAddCustom(false);}}
            onClose={()=>setShowAddCustom(false)}
          />
        )}
      </div>
    </>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<IronRank />);
  </script>

  <script>
    if("serviceWorker"in navigator){
      window.addEventListener("load",()=>{
        navigator.serviceWorker.register("/sw.js")
          .then(reg=>console.log("SW registered:",reg.scope))
          .catch(err=>console.log("SW failed:",err));
      });
    }
  </script>
</body>
</html>
