/* ═══════════════════════════════════════════════════════════  SCORE CALC  */
const epley1RM = (w, r) => w * (1 + Math.min(r, 30) / 30);
const scoreFromThresholds = (val, [t0,t1,t2,t3,t4,t5]) => {
  const thresholds = [0,t0,t1,t2,t3,t4,t5];
  const pctBands   = [0,20,40,60,80,95,100];
  for (let i = 1; i < thresholds.length; i++) {
    if (val <= thresholds[i]) {
      const lo=thresholds[i-1], hi=thresholds[i];
      const t=lo===hi?1:(val-lo)/(hi-lo);
      return Math.round((pctBands[i-1]+t*(pctBands[i]-pctBands[i-1]))*10)/10;
    }
  }
  return 100;
};
const calcScore = (weight,reps,s) => {
  if (!weight||!reps||weight<=0||reps<=0) return 0;
  const e1rm=epley1RM(weight,reps);
  return Math.min(100, scoreFromThresholds(e1rm,[s.beg,s.nov,s.int,s.adv,s.pro,s.eli]));
};
const calcRepsScore = (reps,s) => {
  if (!reps||reps<=0) return 0;
  return Math.min(100, scoreFromThresholds(reps,[s.beg,s.nov,s.int,s.adv,s.pro,s.eli]));
};
const getExScore = (ex,pr) => {
  if (!pr) return 0;
  return ex.isReps ? calcRepsScore(pr.reps,ex.s) : calcScore(pr.weight,pr.reps,ex.s);
};
const scoreToTopPct = s => {
  if (s<=0) return 100;
  if (s>=95) return 1;
  if (s>=80) return Math.round(1+(95-s)/15*9);
  if (s>=60) return Math.round(10+(80-s)/20*20);
  if (s>=40) return Math.round(30+(60-s)/20*30);
  if (s>=20) return Math.round(60+(40-s)/20*30);
  return Math.round(90+(20-s)/20*10);
};

/* Kalorienschätzung pro Session */
const estimateCalories = (session, bodyweightKg=80) => {
  if (!session || !session.exercises) return 0;
  let total = 0;
  session.exercises.forEach(e => {
    e.sets.forEach(st => {
      const w = st.weight || 0;
      const r = st.reps || 0;
      // MET-basierte Näherung: ~5 kcal/min bei Krafttraining
      // Schätzung: (Gewicht * Wiederholungen * 0.00035) + Basisverbrauch pro Satz
      const setTime = r * 3; // ~3 Sekunden pro Rep
      const met = w > 0 ? 5 + (w / bodyweightKg) * 2 : 4;
      total += (met * bodyweightKg * 3.5 / 200) * (setTime / 60);
    });
  });
  return Math.round(Math.max(total, session.exercises.length * 12));
};

/* ═══════════════════════════════════════════════════════════  DEV WARNING  */
function DevWarning() {
  const [dismissed, setDismissed] = useState(() => {
    try { return localStorage.getItem("ir_devwarn_dismissed") === "1"; } catch { return false; }
  });
  if (dismissed) return null;
  return (
    <div className="dev-warn">
      <span style={{fontSize:20,flexShrink:0}}>⚠️</span>
      <div style={{flex:1}}>
        <strong style={{display:"block",marginBottom:4}}>App in Entwicklung</strong>
        Einige Funktionen könnten nicht wie erwartet funktionieren. Daten werden lokal gespeichert – ein Browser-Reset löscht sie. Regelmäßige Backups empfohlen.
        <button onClick={()=>{setDismissed(true);try{localStorage.setItem("ir_devwarn_dismissed","1")}catch{}}} style={{display:"block",marginTop:8,padding:"4px 12px",background:"rgba(251,191,36,.15)",border:"1px solid rgba(251,191,36,.35)",borderRadius:6,color:"var(--gld)",fontSize:12,cursor:"pointer",fontFamily:"var(--head)",fontWeight:700}}>Verstanden</button>
      </div>
    </div>
  );
}
